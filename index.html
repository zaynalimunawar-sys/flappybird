<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: white;
    overflow: hidden;
  }
  #game-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #title {
    font-family: 'Fredoka One', cursive;
    font-size: 40px;
    color: #00ff88;
    text-shadow: 0 0 24px rgba(0,255,136,0.5);
    letter-spacing: 3px;
  }
  #hud { display: flex; gap: 10px; align-items: center; }
  .hud-card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 10px 20px;
    text-align: center;
    min-width: 88px;
    transition: all 0.3s;
  }
  .hud-card.warning { border-color: rgba(255,80,80,0.6); background: rgba(255,80,80,0.1); }
  .hud-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
  .hud-value { font-family: 'Fredoka One', cursive; font-size: 26px; color: #00ff88; line-height: 1; transition: color 0.3s; }
  .hud-divider { width: 2px; height: 48px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  #hole-dots { display: flex; gap: 8px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.25); transition: all 0.3s; }
  .dot.active { background: #00ff88; border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.6); transform: scale(1.2); }
  .dot.done { background: rgba(0,255,136,0.4); border-color: rgba(0,255,136,0.5); }
  #canvas-wrapper {
    position: relative; border-radius: 20px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px rgba(0,255,136,0.25);
  }
  canvas { display: block; cursor: crosshair; }
  #shot-pips { display: flex; gap: 6px; align-items: center; }
  .pip { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); transition: all 0.25s; }
  .pip.used { background: #ff6644; border-color: #ff6644; box-shadow: 0 0 7px rgba(255,100,68,0.6); }
  .pip.last { background: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.7); animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }
  #power-container { width: 300px; display: flex; align-items: center; gap: 10px; }
  #power-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); white-space: nowrap; }
  #power-track { flex: 1; height: 10px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
  #power-fill { height: 100%; width: 0%; border-radius: 10px; background: #00ff88; }
  #message-box { height: 42px; display: flex; align-items: center; justify-content: center; }
  #message { font-family: 'Fredoka One', cursive; font-size: 26px; color: #00ff88; opacity: 0; transform: translateY(10px) scale(0.9); transition: all 0.35s; }
  #message.show { opacity: 1; transform: translateY(0) scale(1); }
  #nextBtn { display: none; padding: 12px 38px; font-size: 16px; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, #00ff88, #00cc66); color: #0f2027; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,255,136,0.3); transition: all 0.2s; margin-top: -6px; }
  #nextBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,255,136,0.45); }
  #hint { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  #overlay-box { background: linear-gradient(135deg, #1a2a3a, #0f2027); border: 2px solid rgba(0,255,136,0.35); border-radius: 24px; padding: 44px 64px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
  #overlay-title { font-family: 'Fredoka One', cursive; font-size: 42px; color: #00ff88; margin-bottom: 6px; }
  #overlay-sub { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 16px; }
  #overlay-score { font-family: 'Fredoka One', cursive; font-size: 64px; margin-bottom: 8px; }
  #overlay-grade { font-family: 'Fredoka One', cursive; font-size: 28px; color: #ffd700; margin-bottom: 26px; }
  #restartBtn { padding: 14px 50px; font-size: 18px; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, #00ff88, #00cc66); color: #0f2027; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,255,136,0.3); transition: all 0.2s; }
  #restartBtn:hover { transform: translateY(-3px); }
  #scorecard { margin-top: 18px; width: 100%; border-collapse: collapse; font-size: 14px; }
  #scorecard th { color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px; font-size: 11px; }
  #scorecard td { padding: 6px 12px; text-align: center; border-top: 1px solid rgba(255,255,255,0.07); }
  .sc-under { color: #00ff88; font-weight: 700; }
  .sc-over { color: #ff6644; }
  .sc-par { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div id="game-container">
  <div id="title">⛳ Mini Golf Pro</div>
  <div id="hud">
    <div class="hud-card"><div class="hud-label">Hole</div><div class="hud-value" id="holeNum">1</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Par</div><div class="hud-value" id="parNum">3</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card" id="shotsCard"><div class="hud-label">Shots Left</div><div class="hud-value" id="shotNum">5</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Score</div><div class="hud-value" id="scoreNum">0</div></div>
  </div>
  <div style="display:flex; gap:16px; align-items:center;">
    <div id="shot-pips"></div>
    <div id="hole-dots"></div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="620" height="440"></canvas>
  </div>
  <div id="power-container">
    <span id="power-label">Power</span>
    <div id="power-track"><div id="power-fill"></div></div>
  </div>
  <div id="message-box"><div id="message"></div></div>
  <button id="nextBtn" onclick="nextHole()">Next Hole ➡️</button>
  <div id="hint">Hold & release to shoot · Aim with mouse or touch</div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">🏆 Round Complete!</div>
    <div id="overlay-sub">Your Scorecard</div>
    <table id="scorecard">
      <tr><th>Hole</th><th>Par</th><th>Shots</th><th>Score</th></tr>
    </table>
    <div style="margin-top:16px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:16px;">
      <div id="overlay-sub">Total Score</div>
      <div id="overlay-score">0</div>
      <div id="overlay-grade"></div>
    </div>
    <button id="restartBtn" onclick="restartGame()">Play Again 🔄</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let ball, hole, walls, bumpers, sandTraps;
let shots, shotsLeft, maxShots, par, holeIndex, totalScore;
let aiming, aimAngle, power, charging, animating;
let particles = [], trailPoints = [];
let shakeFrames = 0, shakeIntensity = 0;
let scorecard = [];
let waveRings = [];

const holes = [
  {
    name: "Straight Shot",
    par: 2, maxShots: 5,
    ball: {x:80,y:220}, hole: {x:540,y:220},
    walls: [
      {x:50,y:150,w:540,h:18},{x:50,y:272,w:540,h:18},
      {x:50,y:150,w:18,h:140},{x:572,y:150,w:18,h:140},
    ],
    bumpers: [],
    sand: []
  },
  {
    name: "The Bend",
    par: 3, maxShots: 6,
    ball: {x:80,y:360}, hole: {x:540,y:80},
    walls: [
      {x:50,y:50,w:540,h:18},{x:50,y:400,w:540,h:18},
      {x:50,y:50,w:18,h:368},{x:572,y:50,w:18,h:368},
      {x:50,y:200,w:280,h:18},{x:330,y:232,w:18,h:168},
    ],
    bumpers: [{x:430,y:290,r:18}],
    sand: [{x:160,y:260,w:120,h:60}]
  },
  {
    name: "Bumper Madness",
    par: 4, maxShots: 7,
    ball: {x:80,y:220}, hole: {x:540,y:220},
    walls: [
      {x:50,y:80,w:540,h:18},{x:50,y:342,w:540,h:18},
      {x:50,y:80,w:18,h:280},{x:572,y:80,w:18,h:280},
      {x:200,y:80,w:18,h:120},{x:400,y:242,w:18,h:100},
    ],
    bumpers: [{x:300,y:160,r:22},{x:200,y:290,r:18},{x:420,y:160,r:20},{x:160,y:220,r:16}],
    sand: []
  },
  {
    name: "Sand Trap",
    par: 4, maxShots: 7,
    ball: {x:80,y:100}, hole: {x:540,y:340},
    walls: [
      {x:50,y:50,w:540,h:18},{x:50,y:382,w:540,h:18},
      {x:50,y:50,w:18,h:350},{x:572,y:50,w:18,h:350},
      {x:200,y:50,w:18,h:160},{x:380,y:222,w:18,h:160},
    ],
    bumpers: [{x:450,y:130,r:20}],
    sand: [{x:220,y:250,w:150,h:80},{x:80,y:180,w:100,h:60}]
  },
  {
    name: "The Labyrinth",
    par: 5, maxShots: 8,
    ball: {x:80,y:80}, hole: {x:540,y:360},
    walls: [
      {x:50,y:50,w:540,h:18},{x:50,y:390,w:540,h:18},
      {x:50,y:50,w:18,h:358},{x:572,y:50,w:18,h:358},
      {x:140,y:50,w:18,h:200},{x:140,y:310,w:18,h:80},
      {x:260,y:138,w:18,h:80},{x:260,y:250,w:18,h:140},
      {x:380,y:50,w:18,h:150},{x:380,y:250,w:18,h:140},
      {x:490,y:138,w:18,h:200},
    ],
    bumpers: [{x:210,y:330,r:16},{x:450,y:90,r:18}],
    sand: [{x:290,y:60,w:80,h:70},{x:420,y:310,w:100,h:60}]
  },
  {
    name: "Boomerang",
    par: 5, maxShots: 8,
    ball: {x:80,y:220}, hole: {x:300,y:220},
    walls: [
      {x:50,y:50,w:540,h:18},{x:50,y:390,w:540,h:18},
      {x:50,y:50,w:18,h:358},{x:572,y:50,w:18,h:358},
      {x:180,y:138,w:18,h:240},
      {x:420,y:138,w:18,h:240},
      {x:180,y:138,w:240,h:18},
      {x:180,y:360,w:240,h:18},
    ],
    bumpers: [{x:490,y:120,r:20},{x:490,y:320,r:20},{x:100,y:120,r:16},{x:100,y:320,r:16}],
    sand: [{x:210,y:170,w:180,h:120}]
  }
];

function init() {
  holeIndex = 0;
  totalScore = 0;
  scorecard = [];
  document.getElementById('overlay').classList.remove('show');
  buildHoleDots();
  loadHole();
}

function restartGame() { init(); }

function buildHoleDots() {
  const container = document.getElementById('hole-dots');
  container.innerHTML = '';
  holes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot' + i;
    container.appendChild(d);
  });
}

function buildPips(max) {
  const c = document.getElementById('shot-pips');
  c.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const p = document.createElement('div');
    p.className = 'pip'; p.id = 'pip' + i;
    c.appendChild(p);
  }
}

function updatePips() {
  for (let i = 0; i < maxShots; i++) {
    const p = document.getElementById('pip' + i);
    if (!p) continue;
    p.className = 'pip';
    if (i < shots) p.classList.add('used');
    else if (i === maxShots - 1 && shotsLeft === 1) p.classList.add('last');
  }
}

function updateDots() {
  holes.forEach((_, i) => {
    const d = document.getElementById('dot' + i);
    if (!d) return;
    d.className = 'dot';
    if (i < holeIndex) d.classList.add('done');
    else if (i === holeIndex) d.classList.add('active');
  });
}

function loadHole() {
  const h = holes[holeIndex];
  ball = { x: h.ball.x, y: h.ball.y, vx: 0, vy: 0, r: 10 };
  hole = { x: h.hole.x, y: h.hole.y, r: 15 };
  walls = h.walls;
  bumpers = h.bumpers;
  sandTraps = h.sand;
  par = h.par;
  maxShots = h.maxShots;
  shots = 0; shotsLeft = maxShots;
  aiming = false; charging = false; animating = false; power = 0;
  particles = []; trailPoints = []; waveRings = [];
  document.getElementById('holeNum').textContent = holeIndex + 1;
  document.getElementById('parNum').textContent = par;
  document.getElementById('shotNum').textContent = shotsLeft;
  document.getElementById('power-fill').style.width = '0%';
  const msg = document.getElementById('message');
  msg.textContent = ''; msg.classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('shotsCard').classList.remove('warning');
  updateDots();
  buildPips(maxShots);
  draw();
}

function nextHole() {
  holeIndex++;
  if (holeIndex >= holes.length) { showGameOver(); return; }
  loadHole();
}

function showMessage(text, color) {
  const msg = document.getElementById('message');
  msg.classList.remove('show');
  msg.textContent = text;
  msg.style.color = color || '#00ff88';
  setTimeout(() => msg.classList.add('show'), 40);
}

function updatePowerBar() {
  const f = document.getElementById('power-fill');
  f.style.width = power + '%';
  f.style.background = power < 40 ? 'linear-gradient(90deg,#00ff88,#00cc66)'
    : power < 70 ? 'linear-gradient(90deg,#ffcc00,#ff9900)'
    : 'linear-gradient(90deg,#ff6644,#ff2222)';
}

// ---- Particles ----
function spawnBounce(x, y) {
  for (let i = 0; i < 7; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 20, maxLife: 20, size: 2+Math.random()*3, color: '#aaddff', g: 0 });
  }
}

function spawnHole(x, y) {
  const cols = ['#00ff88','#ffcc00','#ff6644','#ff44aa','#44aaff','#fff'];
  for (let i = 0; i < 50; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 3 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2, life: 60, maxLife: 60, size: 3+Math.random()*5, color: cols[Math.floor(Math.random()*cols.length)], g: 0.15 });
  }
  waveRings.push({ x, y, r: 5, maxR: 60, life: 40, maxLife: 40 });
}

function spawnBumperHit(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 22, maxLife: 22, size: 2+Math.random()*4, color, g: 0.05 });
  }
}

function triggerShake(i, f) { shakeIntensity = i; shakeFrames = f; }

// ---- Draw ----
function draw() {
  ctx.save();
  if (shakeFrames > 0) {
    ctx.translate((Math.random()-.5)*shakeIntensity, (Math.random()-.5)*shakeIntensity);
    shakeFrames--;
  }
  ctx.clearRect(-20,-20,W+40,H+40);

  // Green background
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#2d6a27'); bg.addColorStop(1,'#1e4a1a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for (let i=0;i<W;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for (let j=0;j<H;j+=30){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(W,j);ctx.stroke();}

  // Sand traps
  sandTraps.forEach(s => {
    ctx.save();
    const sg = ctx.createLinearGradient(s.x,s.y,s.x+s.w,s.y+s.h);
    sg.addColorStop(0,'#d4a843'); sg.addColorStop(1,'#b8902e');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.roundRect(s.x, s.y, s.w, s.h, 14);
    ctx.fill();
    // Sand dots
    ctx.fillStyle = 'rgba(255,255,200,0.2)';
    for (let i=0;i<18;i++) {
      ctx.beginPath();
      ctx.arc(s.x+8+Math.sin(i*7.3)*s.w*0.4+s.w/2, s.y+8+Math.cos(i*5.1)*s.h*0.35+s.h/2, 2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });

  // Walls
  walls.forEach(w => {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(w.x+4, w.y+4, w.w, w.h);
    const wg = ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    wg.addColorStop(0,'#a0704a'); wg.addColorStop(1,'#6b3a1f');
    ctx.fillStyle = wg;
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(w.x, w.y, w.w, 5);
  });

  // Bumpers
  bumpers.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 16; ctx.shadowColor = '#ff44aa';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    const bg2 = ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,2,b.x,b.y,b.r);
    bg2.addColorStop(0,'#ff88cc'); bg2.addColorStop(1,'#cc1166');
    ctx.fillStyle = bg2; ctx.fill();
    ctx.strokeStyle = '#ff44aa'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  });

  // Wave rings
  waveRings.forEach(wr => {
    const alpha = wr.life / wr.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(wr.x, wr.y, wr.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });

  // Hole shadow
  ctx.beginPath(); ctx.arc(hole.x+3, hole.y+3, hole.r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

  // Hole glow
  ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = '#00ff88';
  ctx.strokeStyle = 'rgba(0,255,136,0.35)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(hole.x, hole.y, hole.r+4, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // Hole
  ctx.beginPath(); ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI*2);
  const hg = ctx.createRadialGradient(hole.x,hole.y,2,hole.x,hole.y,hole.r);
  hg.addColorStop(0,'#000'); hg.addColorStop(1,'#1a1a1a');
  ctx.fillStyle = hg; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();

  // Flag
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(hole.x, hole.y-4); ctx.lineTo(hole.x, hole.y-36); ctx.stroke();
  ctx.fillStyle = '#ff4455';
  ctx.beginPath(); ctx.moveTo(hole.x,hole.y-36); ctx.lineTo(hole.x+18,hole.y-28); ctx.lineTo(hole.x,hole.y-20); ctx.closePath(); ctx.fill();

  // Trail
  trailPoints.forEach(t => {
    const a = (t.life/20)*0.35;
    ctx.save(); ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(t.x, t.y, ball.r*(t.life/20)*0.8, 0, Math.PI*2);
    ctx.fillStyle = '#aaddff'; ctx.fill(); ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    const a = p.life/p.maxLife;
    ctx.save(); ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
  });

  // Aim line
  if (aiming && !animating) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
    ctx.setLineDash([6,6]);
    const tx = ball.x + Math.cos(aimAngle)*100, ty = ball.y + Math.sin(aimAngle)*100;
    ctx.beginPath(); ctx.moveTo(ball.x, ball.y); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx-Math.cos(aimAngle-0.4)*14, ty-Math.sin(aimAngle-0.4)*14);
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx-Math.cos(aimAngle+0.4)*14, ty-Math.sin(aimAngle+0.4)*14);
    ctx.stroke();
    ctx.restore();
  }

  // Ball shadow
  ctx.beginPath(); ctx.arc(ball.x+3, ball.y+3, ball.r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  // Ball
  const ballG = ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,ball.r);
  ballG.addColorStop(0,'#fff'); ballG.addColorStop(0.5,'#e8e8e8'); ballG.addColorStop(1,'#bbb');
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = ballG; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(ball.x-3, ball.y-3, 3.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();

  ctx.restore();
}

// ---- Physics ----
function update() {
  if (!animating) return;

  // Trail
  trailPoints.push({x:ball.x, y:ball.y, life:20});
  trailPoints = trailPoints.filter(t=>t.life-- > 0);

  // Update particles
  particles = particles.filter(p=>p.life-- > 0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.96;});

  // Wave rings
  waveRings = waveRings.filter(w=>w.life-- > 0);
  waveRings.forEach(w=>{ w.r += (w.maxR-w.r)*0.12; });

  ball.vx *= 0.987; ball.vy *= 0.987;

  // Sand trap friction
  sandTraps.forEach(s => {
    if (ball.x>s.x && ball.x<s.x+s.w && ball.y>s.y && ball.y<s.y+s.h) {
      ball.vx *= 0.93; ball.vy *= 0.93;
    }
  });

  ball.x += ball.vx; ball.y += ball.vy;

  // Wall collisions
  walls.forEach(w => {
    if (ball.x+ball.r>w.x && ball.x-ball.r<w.x+w.w && ball.y+ball.r>w.y && ball.y-ball.r<w.y+w.h) {
      const oL=(ball.x+ball.r)-w.x, oR=(w.x+w.w)-(ball.x-ball.r);
      const oT=(ball.y+ball.r)-w.y, oB=(w.y+w.h)-(ball.y-ball.r);
      const min=Math.min(oL,oR,oT,oB);
      if(min===oL){ball.x=w.x-ball.r;ball.vx*=-0.65;spawnBounce(ball.x,ball.y);triggerShake(2,4);}
      else if(min===oR){ball.x=w.x+w.w+ball.r;ball.vx*=-0.65;spawnBounce(ball.x,ball.y);triggerShake(2,4);}
      else if(min===oT){ball.y=w.y-ball.r;ball.vy*=-0.65;spawnBounce(ball.x,ball.y);triggerShake(2,4);}
      else{ball.y=w.y+w.h+ball.r;ball.vy*=-0.65;spawnBounce(ball.x,ball.y);triggerShake(2,4);}
    }
  });

  // Bumper collisions
  bumpers.forEach(b => {
    const dx=ball.x-b.x, dy=ball.y-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist < ball.r+b.r) {
      const nx=dx/dist, ny=dy/dist;
      ball.x=b.x+nx*(ball.r+b.r);
      ball.y=b.y+ny*(ball.r+b.r);
      const dot=ball.vx*nx+ball.vy*ny;
      ball.vx=(ball.vx-2*dot*nx)*-0.85;
      ball.vy=(ball.vy-2*dot*ny)*-0.85;
      const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      if(spd<4){ball.vx=nx*4;ball.vy=ny*4;}
      spawnBumperHit(b.x,b.y,'#ff88cc');
      triggerShake(3,8);
    }
  });

  // Edge bounces
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-0.65;spawnBounce(ball.x,ball.y);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx*=-0.65;spawnBounce(ball.x,ball.y);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-0.65;spawnBounce(ball.x,ball.y);}
  if(ball.y+ball.r>H){ball.y=H-ball.r;ball.vy*=-0.65;spawnBounce(ball.x,ball.y);}

  // Hole check
  const dx=ball.x-hole.x, dy=ball.y-hole.y;
  if(Math.sqrt(dx*dx+dy*dy)<hole.r) {
    animating=false;
    ball.x=hole.x; ball.y=hole.y;
    spawnHole(hole.x,hole.y);
    triggerShake(4,12);

    // Animate celebration
    let cf=70;
    function celebLoop(){
      particles=particles.filter(p=>p.life-- > 0);
      particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=0.96;});
      waveRings=waveRings.filter(w=>w.life-- > 0);
      waveRings.forEach(w=>{w.r+=(w.maxR-w.r)*0.12;});
      draw();
      if(cf-- > 0) requestAnimationFrame(celebLoop);
    }
    celebLoop();

    const diff=shots-par;
    let msg='', color='#00ff88';
    if(shots===1){msg='🏆 HOLE IN ONE!!!';color='#ffd700';}
    else if(diff<=-2){msg='🦅 Eagle! Incredible!';color='#ffd700';}
    else if(diff===-1){msg='🐦 Birdie! Sweet!';color='#00ff88';}
    else if(diff===0){msg='✅ Par! Solid!';color='#aaffdd';}
    else if(diff===1){msg='😬 Bogey';color='#ffaa44';}
    else{msg='😅 Double Bogey+';color='#ff6644';}

    totalScore+=diff;
    scorecard.push({hole:holeIndex+1, par, shots, diff});
    const scoreEl=document.getElementById('scoreNum');
    scoreEl.textContent=totalScore>0?'+'+totalScore:totalScore;
    scoreEl.style.color=totalScore<0?'#00ff88':totalScore>0?'#ff6644':'#fff';
    showMessage(msg,color);

    if(holeIndex<holes.length-1){
      setTimeout(()=>document.getElementById('nextBtn').style.display='inline-block',700);
    } else {
      setTimeout(showGameOver, 1400);
    }
    return;
  }

  // Ball stopped
  if(Math.abs(ball.vx)<0.05 && Math.abs(ball.vy)<0.05){
    ball.vx=0; ball.vy=0; animating=false;
    if(shotsLeft<=0) {
      scorecard.push({hole:holeIndex+1,par,shots:maxShots,diff:maxShots-par});
      totalScore+=(maxShots-par);
      showMessage('💀 Out of Shots! +'+( maxShots-par),'#ff4444');
      setTimeout(()=>{
        if(holeIndex<holes.length-1) document.getElementById('nextBtn').style.display='inline-block';
        else showGameOver();
      },800);
    }
    return;
  }

  draw();
  requestAnimationFrame(update);
}

function showGameOver() {
  // Build scorecard table
  const table = document.getElementById('scorecard');
  while(table.rows.length>1) table.deleteRow(1);
  scorecard.forEach(s=>{
    const row=table.insertRow();
    row.insertCell().textContent=s.hole;
    row.insertCell().textContent=s.par;
    row.insertCell().textContent=s.shots;
    const dc=row.insertCell();
    dc.textContent=s.diff===0?'E':s.diff>0?'+'+s.diff:s.diff;
    dc.className=s.diff<0?'sc-under':s.diff>0?'sc-over':'sc-par';
  });

  const scoreEl=document.getElementById('overlay-score');
  scoreEl.textContent=totalScore>0?'+'+totalScore:totalScore;
  scoreEl.style.color=totalScore<-4?'#ffd700':totalScore<0?'#00ff88':totalScore>4?'#ff4444':'#fff';

  const grades=[
    {max:-6,text:'🏆 Golf Legend!'},
    {max:-3,text:'🦅 Eagle Scout!'},
    {max:0,text:'⛳ Par Player'},
    {max:4,text:'😅 Getting There!'},
    {max:99,text:'🔰 Keep Practicing!'},
  ];
  document.getElementById('overlay-grade').textContent=grades.find(g=>totalScore<=g.max).text;
  document.getElementById('overlay').classList.add('show');
}

function shoot() {
  if(power>2 && shotsLeft>0){
    shots++; shotsLeft--;
    document.getElementById('shotNum').textContent=shotsLeft;
    if(shotsLeft<=1) document.getElementById('shotsCard').classList.add('warning');
    updatePips();
    ball.vx=Math.cos(aimAngle)*power*0.18;
    ball.vy=Math.sin(aimAngle)*power*0.18;
    animating=true; power=0; updatePowerBar();
    requestAnimationFrame(update);
  }
}

// Controls
canvas.addEventListener('mousedown',(e)=>{
  if(animating||shotsLeft<=0) return;
  const r=canvas.getBoundingClientRect();
  aimAngle=Math.atan2(e.clientY-r.top-ball.y, e.clientX-r.left-ball.x);
  aiming=true; charging=true; power=0; draw();
});
canvas.addEventListener('mousemove',(e)=>{
  if(!aiming||animating) return;
  const r=canvas.getBoundingClientRect();
  aimAngle=Math.atan2(e.clientY-r.top-ball.y, e.clientX-r.left-ball.x);
  draw();
});
canvas.addEventListener('mouseup',()=>{ if(!aiming||animating) return; aiming=false; charging=false; shoot(); draw(); });

canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); if(animating||shotsLeft<=0) return; const r=canvas.getBoundingClientRect(),t=e.touches[0]; aimAngle=Math.atan2(t.clientY-r.top-ball.y,t.clientX-r.left-ball.x); aiming=true;charging=true;power=0;draw(); });
canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); if(!aiming) return; const r=canvas.getBoundingClientRect(),t=e.touches[0]; aimAngle=Math.atan2(t.clientY-r.top-ball.y,t.clientX-r.left-ball.x); draw(); });
canvas.addEventListener('touchend',(e)=>{ e.preventDefault(); if(!aiming) return; aiming=false;charging=false;shoot();draw(); });

setInterval(()=>{ if(charging&&aiming){power=Math.min(power+1.5,100);updatePowerBar();draw();} },16);

init();
</script>
