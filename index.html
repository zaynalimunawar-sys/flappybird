<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: white; }
  canvas { border: 3px solid #00ff88; border-radius: 10px; cursor: crosshair; }
  #ui { display: flex; gap: 30px; margin-bottom: 15px; font-size: 18px; }
  #ui span { background: #16213e; padding: 8px 20px; border-radius: 20px; border: 1px solid #00ff88; }
  #message { margin-top: 15px; font-size: 22px; color: #00ff88; height: 30px; }
  #nextBtn { display: none; margin-top: 10px; padding: 10px 30px; font-size: 16px; background: #00ff88; color: #1a1a2e; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
  #nextBtn:hover { background: #00cc66; }
</style>
</head>
<body>

<div id="ui">
  <span>Hole: <b id="holeNum">1</b></span>
  <span>Par: <b id="parNum">3</b></span>
  <span>Shots: <b id="shotNum">0</b></span>
  <span>Score: <b id="scoreNum">0</b></span>
</div>

<canvas id="canvas" width="600" height="450"></canvas>
<div id="message"></div>
<button id="nextBtn" onclick="nextHole()">Next Hole ➡️</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let ball, hole, walls, shots, par, holeIndex, totalScore, aiming, aimAngle, power, charging, animating;

const holes = [
  {
    par: 3,
    ball: {x: 80, y: 225},
    hole: {x: 520, y: 225},
    walls: [
      {x:50, y:150, w:500, h:20},
      {x:50, y:280, w:500, h:20},
      {x:50, y:150, w:20, h:150},
      {x:530, y:150, w:20, h:150},
      {x:250, y:170, w:20, h:80},
    ]
  },
  {
    par: 4,
    ball: {x: 80, y: 380},
    hole: {x: 520, y: 80},
    walls: [
      {x:50, y:50, w:520, h:20},
      {x:50, y:400, w:520, h:20},
      {x:50, y:50, w:20, h:370},
      {x:550, y:50, w:20, h:370},
      {x:200, y:200, w:20, h:200},
      {x:380, y:50, w:20, h:200},
    ]
  },
  {
    par: 5,
    ball: {x: 80, y: 80},
    hole: {x: 520, y: 370},
    walls: [
      {x:50, y:50, w:520, h:20},
      {x:50, y:400, w:520, h:20},
      {x:50, y:50, w:20, h:370},
      {x:550, y:50, w:20, h:370},
      {x:150, y:50, w:20, h:200},
      {x:300, y:200, w:20, h:200},
      {x:430, y:50, w:20, h:250},
    ]
  }
];

function init() {
  holeIndex = 0;
  totalScore = 0;
  loadHole();
}

function loadHole() {
  const h = holes[holeIndex];
  ball = { x: h.ball.x, y: h.ball.y, vx: 0, vy: 0, radius: 10 };
  hole = { x: h.hole.x, y: h.hole.y, radius: 14 };
  walls = h.walls;
  par = h.par;
  shots = 0;
  aiming = false;
  charging = false;
  animating = false;
  power = 0;
  document.getElementById('holeNum').textContent = holeIndex + 1;
  document.getElementById('parNum').textContent = par;
  document.getElementById('shotNum').textContent = shots;
  document.getElementById('message').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background green
  ctx.fillStyle = '#2d5a27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw grass texture lines
  ctx.strokeStyle = '#336b2d';
  ctx.lineWidth = 1;
  for(let i = 0; i < canvas.width; i += 30) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }

  // Draw walls
  walls.forEach(w => {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(w.x+2, w.y+2, w.w-4, 6);
  });

  // Draw hole
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Flag
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(hole.x, hole.y - 5);
  ctx.lineTo(hole.x, hole.y - 30);
  ctx.stroke();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(hole.x, hole.y - 30);
  ctx.lineTo(hole.x + 15, hole.y - 23);
  ctx.lineTo(hole.x, hole.y - 16);
  ctx.fill();

  // Aim line
  if (aiming && !animating) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x + Math.cos(aimAngle) * 80, ball.y + Math.sin(aimAngle) * 80);
    ctx.stroke();
    ctx.restore();

    // Power bar
    ctx.fillStyle = '#333';
    ctx.fillRect(canvas.width/2 - 75, canvas.height - 30, 150, 15);
    const col = power < 40 ? '#00ff88' : power < 70 ? '#ffaa00' : '#ff4444';
    ctx.fillStyle = col;
    ctx.fillRect(canvas.width/2 - 75, canvas.height - 30, power * 1.5, 15);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(canvas.width/2 - 75, canvas.height - 30, 150, 15);
  }

  // Draw ball
  const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#cccccc');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function update() {
  if (!animating) return;

  ball.vx *= 0.985;
  ball.vy *= 0.985;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  walls.forEach(w => {
    if (ball.x + ball.radius > w.x && ball.x - ball.radius < w.x + w.w &&
        ball.y + ball.radius > w.y && ball.y - ball.radius < w.y + w.h) {
      const overlapLeft = (ball.x + ball.radius) - w.x;
      const overlapRight = (w.x + w.w) - (ball.x - ball.radius);
      const overlapTop = (ball.y + ball.radius) - w.y;
      const overlapBottom = (w.y + w.h) - (ball.y - ball.radius);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (minOverlap === overlapLeft) { ball.x = w.x - ball.radius; ball.vx *= -0.7; }
      else if (minOverlap === overlapRight) { ball.x = w.x + w.w + ball.radius; ball.vx *= -0.7; }
      else if (minOverlap === overlapTop) { ball.y = w.y - ball.radius; ball.vy *= -0.7; }
      else { ball.y = w.y + w.h + ball.radius; ball.vy *= -0.7; }
    }
  });

  // Canvas edge bounce
  if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.7; }
  if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.7; }
  if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.7; }
  if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -0.7; }

  // Check hole
  const dx = ball.x - hole.x;
  const dy = ball.y - hole.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < hole.radius) {
    animating = false;
    ball.x = hole.x; ball.y = hole.y;
    draw();
    const diff = shots - par;
    let msg = '';
    if (shots === 1) msg = '🏆 Hole in One!';
    else if (diff <= -2) msg = '🦅 Eagle! Amazing!';
    else if (diff === -1) msg = '🐦 Birdie! Great shot!';
    else if (diff === 0) msg = '✅ Par! Nice!';
    else if (diff === 1) msg = '😬 Bogey';
    else msg = '😅 Double Bogey+';
    totalScore += diff;
    document.getElementById('message').textContent = msg;
    document.getElementById('scoreNum').textContent = totalScore > 0 ? '+' + totalScore : totalScore;
    if (holeIndex < holes.length - 1) {
      document.getElementById('nextBtn').style.display = 'inline-block';
    } else {
      setTimeout(() => {
        document.getElementById('message').textContent = `🎉 Game Over! Final Score: ${totalScore > 0 ? '+' + totalScore : totalScore}`;
      }, 500);
    }
    return;
  }

  // Stop if very slow
  if (Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.05) {
    ball.vx = 0; ball.vy = 0;
    animating = false;
  }

  draw();
  if (animating) requestAnimationFrame(update);
}

function nextHole() {
  holeIndex++;
  loadHole();
}

// Mouse controls
canvas.addEventListener('mousedown', (e) => {
  if (animating) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  aimAngle = Math.atan2(my - ball.y, mx - ball.x);
  aiming = true;
  charging = true;
  power = 0;
  draw();
});

canvas.addEventListener('mousemove', (e) => {
  if (!aiming || animating) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  aimAngle = Math.atan2(my - ball.y, mx - ball.x);
  draw();
});

canvas.addEventListener('mouseup', () => {
  if (!aiming || animating) return;
  aiming = false;
  charging = false;
  if (power > 2) {
    shots++;
    document.getElementById('shotNum').textContent = shots;
    const speed = power * 0.18;
    ball.vx = Math.cos(aimAngle) * speed;
    ball.vy = Math.sin(aimAngle) * speed;
    animating = true;
    requestAnimationFrame(update);
  }
  draw();
});

// Power charging
setInterval(() => {
  if (charging && aiming) {
    power = Math.min(power + 1.5, 100);
    draw();
  }
}, 16);

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;
  aimAngle = Math.atan2(my - ball.y, mx - ball.x);
  aiming = true; charging = true; power = 0;
  draw();
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!aiming) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  aimAngle = Math.atan2(t.clientY - rect.top - ball.y, t.clientX - rect.left - ball.x);
  draw();
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!aiming) return;
  aiming = false; charging = false;
  if (power > 2) {
    shots++;
    document.getElementById('shotNum').textContent = shots;
    ball.vx = Math.cos(aimAngle) * power * 0.18;
    ball.vy = Math.sin(aimAngle) * power * 0.18;
    animating = true;
    requestAnimationFrame(update);
  }
  draw();
});

init();
</script>
</body>
</html>
