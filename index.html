<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', Arial, sans-serif;
    color: white;
  }

  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Title */
  #title {
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.5), 0 4px 8px rgba(0,0,0,0.4);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  /* Top HUD */
  #hud {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .hud-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 10px 22px;
    text-align: center;
    min-width: 90px;
  }

  .hud-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
  }

  .hud-value {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: #00ff88;
    line-height: 1;
  }

  .hud-divider {
    width: 2px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }

  /* Canvas */
  #canvas-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 3px rgba(0,255,136,0.3);
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  /* Hole indicator dots */
  #hole-dots {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.3);
    transition: all 0.3s ease;
  }

  .dot.active {
    background: #00ff88;
    border-color: #00ff88;
    box-shadow: 0 0 10px rgba(0,255,136,0.6);
    transform: scale(1.2);
  }

  .dot.done {
    background: rgba(0,255,136,0.4);
    border-color: rgba(0,255,136,0.6);
  }

  /* Message */
  #message-box {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #message {
    font-family: 'Fredoka One', cursive;
    font-size: 24px;
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0,255,136,0.5);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }

  #message.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Next button */
  #nextBtn {
    display: none;
    padding: 12px 40px;
    font-size: 16px;
    font-family: 'Fredoka One', cursive;
    font-weight: 400;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: #0f2027;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,255,136,0.3);
    transition: all 0.2s ease;
    margin-top: -8px;
  }

  #nextBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(0,255,136,0.45);
  }

  #nextBtn:active {
    transform: translateY(0);
  }

  /* Power bar */
  #power-container {
    width: 300px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #power-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  #power-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }

  #power-fill {
    height: 100%;
    width: 0%;
    border-radius: 10px;
    transition: background 0.1s;
    background: #00ff88;
  }

  /* Hint */
  #hint {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="title">⛳ Mini Golf</div>

  <div id="hud">
    <div class="hud-card">
      <div class="hud-label">Hole</div>
      <div class="hud-value" id="holeNum">1</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-card">
      <div class="hud-label">Par</div>
      <div class="hud-value" id="parNum">3</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-card">
      <div class="hud-label">Shots</div>
      <div class="hud-value" id="shotNum">0</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-card">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="scoreNum">0</div>
    </div>
  </div>

  <div id="hole-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="600" height="420"></canvas>
  </div>

  <div id="power-container">
    <span id="power-label">Power</span>
    <div id="power-track"><div id="power-fill"></div></div>
  </div>

  <div id="message-box">
    <div id="message"></div>
  </div>

  <button id="nextBtn" onclick="nextHole()">Next Hole ➡️</button>

  <div id="hint">Hold & release to shoot · Aim with mouse</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let ball, hole, walls, shots, par, holeIndex, totalScore, aiming, aimAngle, power, charging, animating;

const holes = [
  {
    par: 3,
    ball: {x: 80, y: 210},
    hole: {x: 520, y: 210},
    walls: [
      {x:50, y:140, w:500, h:18},
      {x:50, y:262, w:500, h:18},
      {x:50, y:140, w:18, h:140},
      {x:532, y:140, w:18, h:140},
      {x:240, y:158, w:18, h:80},
    ]
  },
  {
    par: 4,
    ball: {x: 80, y: 360},
    hole: {x: 520, y: 70},
    walls: [
      {x:50, y:50, w:520, h:18},
      {x:50, y:390, w:520, h:18},
      {x:50, y:50, w:18, h:358},
      {x:552, y:50, w:18, h:358},
      {x:190, y:180, w:18, h:210},
      {x:370, y:50, w:18, h:210},
    ]
  },
  {
    par: 5,
    ball: {x: 80, y: 80},
    hole: {x: 520, y: 350},
    walls: [
      {x:50, y:50, w:520, h:18},
      {x:50, y:380, w:520, h:18},
      {x:50, y:50, w:18, h:348},
      {x:552, y:50, w:18, h:348},
      {x:140, y:50, w:18, h:210},
      {x:290, y:180, w:18, h:200},
      {x:420, y:50, w:18, h:240},
    ]
  }
];

function init() {
  holeIndex = 0;
  totalScore = 0;
  loadHole();
}

function updateDots() {
  for (let i = 0; i < holes.length; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = 'dot';
    if (i < holeIndex) dot.classList.add('done');
    else if (i === holeIndex) dot.classList.add('active');
  }
}

function loadHole() {
  const h = holes[holeIndex];
  ball = { x: h.ball.x, y: h.ball.y, vx: 0, vy: 0, radius: 10 };
  hole = { x: h.hole.x, y: h.hole.y, radius: 14 };
  walls = h.walls;
  par = h.par;
  shots = 0;
  aiming = false;
  charging = false;
  animating = false;
  power = 0;
  document.getElementById('holeNum').textContent = holeIndex + 1;
  document.getElementById('parNum').textContent = par;
  document.getElementById('shotNum').textContent = shots;
  document.getElementById('power-fill').style.width = '0%';
  const msg = document.getElementById('message');
  msg.textContent = '';
  msg.classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
  updateDots();
  draw();
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.classList.remove('show');
  msg.textContent = text;
  setTimeout(() => msg.classList.add('show'), 50);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background gradient green
  const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bgGrad.addColorStop(0, '#2d6a27');
  bgGrad.addColorStop(1, '#1e4a1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.width; i += 30) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }
  for (let j = 0; j < canvas.height; j += 30) {
    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
  }

  // Walls with 3D look
  walls.forEach(w => {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(w.x + 4, w.y + 4, w.w, w.h);
    // Main body
    const wGrad = ctx.createLinearGradient(w.x, w.y, w.x, w.y + w.h);
    wGrad.addColorStop(0, '#a0704a');
    wGrad.addColorStop(1, '#6b3a1f');
    ctx.fillStyle = wGrad;
    ctx.fillRect(w.x, w.y, w.w, w.h);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(w.x, w.y, w.w, 5);
  });

  // Hole shadow
  ctx.beginPath();
  ctx.arc(hole.x + 3, hole.y + 3, hole.radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Hole
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
  const holeGrad = ctx.createRadialGradient(hole.x, hole.y, 2, hole.x, hole.y, hole.radius);
  holeGrad.addColorStop(0, '#000');
  holeGrad.addColorStop(1, '#222');
  ctx.fillStyle = holeGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Flag pole
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(hole.x, hole.y - 4);
  ctx.lineTo(hole.x, hole.y - 32);
  ctx.stroke();

  // Flag
  ctx.fillStyle = '#ff4455';
  ctx.beginPath();
  ctx.moveTo(hole.x, hole.y - 32);
  ctx.lineTo(hole.x + 16, hole.y - 25);
  ctx.lineTo(hole.x, hole.y - 18);
  ctx.closePath();
  ctx.fill();

  // Aim line
  if (aiming && !animating) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x + Math.cos(aimAngle) * 90, ball.y + Math.sin(aimAngle) * 90);
    ctx.stroke();
    // Arrow tip
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    const tx = ball.x + Math.cos(aimAngle) * 90;
    const ty = ball.y + Math.sin(aimAngle) * 90;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - Math.cos(aimAngle - 0.4) * 12, ty - Math.sin(aimAngle - 0.4) * 12);
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - Math.cos(aimAngle + 0.4) * 12, ty - Math.sin(aimAngle + 0.4) * 12);
    ctx.stroke();
    ctx.restore();
  }

  // Ball shadow
  ctx.beginPath();
  ctx.arc(ball.x + 3, ball.y + 3, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Ball
  const ballGrad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.radius);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.5, '#e8e8e8');
  ballGrad.addColorStop(1, '#bbbbbb');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = ballGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Ball shine
  ctx.beginPath();
  ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();
}

function updatePowerBar() {
  const fill = document.getElementById('power-fill');
  fill.style.width = power + '%';
  if (power < 40) fill.style.background = 'linear-gradient(90deg, #00ff88, #00cc66)';
  else if (power < 70) fill.style.background = 'linear-gradient(90deg, #ffcc00, #ff9900)';
  else fill.style.background = 'linear-gradient(90deg, #ff6644, #ff2222)';
}

function update() {
  if (!animating) return;

  ball.vx *= 0.987;
  ball.vy *= 0.987;
  ball.x += ball.vx;
  ball.y += ball.vy;

  walls.forEach(w => {
    if (ball.x + ball.radius > w.x && ball.x - ball.radius < w.x + w.w &&
        ball.y + ball.radius > w.y && ball.y - ball.radius < w.y + w.h) {
      const overlapLeft = (ball.x + ball.radius) - w.x;
      const overlapRight = (w.x + w.w) - (ball.x - ball.radius);
      const overlapTop = (ball.y + ball.radius) - w.y;
      const overlapBottom = (w.y + w.h) - (ball.y - ball.radius);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (minOverlap === overlapLeft) { ball.x = w.x - ball.radius; ball.vx *= -0.65; }
      else if (minOverlap === overlapRight) { ball.x = w.x + w.w + ball.radius; ball.vx *= -0.65; }
      else if (minOverlap === overlapTop) { ball.y = w.y - ball.radius; ball.vy *= -0.65; }
      else { ball.y = w.y + w.h + ball.radius; ball.vy *= -0.65; }
    }
  });

  if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.65; }
  if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.65; }
  if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.65; }
  if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -0.65; }

  const dx = ball.x - hole.x;
  const dy = ball.y - hole.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < hole.radius) {
    animating = false;
    ball.x = hole.x; ball.y = hole.y;
    draw();
    const diff = shots - par;
    let msg = '';
    if (shots === 1) msg = '🏆 Hole in One!';
    else if (diff <= -2) msg = '🦅 Eagle! Amazing!';
    else if (diff === -1) msg = '🐦 Birdie! Nice!';
    else if (diff === 0) msg = '✅ Par!';
    else if (diff === 1) msg = '😬 Bogey';
    else msg = '😅 Double Bogey+';
    totalScore += diff;
    const scoreEl = document.getElementById('scoreNum');
    scoreEl.textContent = totalScore > 0 ? '+' + totalScore : totalScore;
    scoreEl.style.color = totalScore < 0 ? '#00ff88' : totalScore > 0 ? '#ff6644' : '#fff';
    showMessage(msg);
    if (holeIndex < holes.length - 1) {
      document.getElementById('nextBtn').style.display = 'inline-block';
    } else {
      setTimeout(() => {
        showMessage(`🎉 Done! Final: ${totalScore > 0 ? '+' + totalScore : totalScore}`);
      }, 800);
    }
    return;
  }

  if (Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.05) {
    ball.vx = 0; ball.vy = 0;
    animating = false;
  }

  draw();
  if (animating) requestAnimationFrame(update);
}

function nextHole() {
  holeIndex++;
  loadHole();
}

canvas.addEventListener('mousedown', (e) => {
  if (animating) return;
  const rect = canvas.getBoundingClientRect();
  aimAngle = Math.atan2(e.clientY - rect.top - ball.y, e.clientX - rect.left - ball.x);
  aiming = true; charging = true; power = 0;
  draw();
});

canvas.addEventListener('mousemove', (e) => {
  if (!aiming || animating) return;
  const rect = canvas.getBoundingClientRect();
  aimAngle = Math.atan2(e.clientY - rect.top - ball.y, e.clientX - rect.left - ball.x);
  draw();
});

canvas.addEventListener('mouseup', () => {
  if (!aiming || animating) return;
  aiming = false; charging = false;
  if (power > 2) {
    shots++;
    document.getElementById('shotNum').textContent = shots;
    ball.vx = Math.cos(aimAngle) * power * 0.18;
    ball.vy = Math.sin(aimAngle) * power * 0.18;
    animating = true;
    power = 0;
    updatePowerBar();
    requestAnimationFrame(update);
  }
  draw();
});

setInterval(() => {
  if (charging && aiming) {
    power = Math.min(power + 1.5, 100);
    updatePowerBar();
    draw();
  }
}, 16);

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  aimAngle = Math.atan2(t.clientY - rect.top - ball.y, t.clientX - rect.left - ball.x);
  aiming = true; charging = true; power = 0;
  draw();
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!aiming) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  aimAngle = Math.atan2(t.clientY - rect.top - ball.y, t.clientX - rect.left - ball.x);
  draw();
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!aiming) return;
  aiming = false; charging = false;
  if (power > 2) {
    shots++;
    document.getElementById('shotNum').textContent = shots;
    ball.vx = Math.cos(aimAngle) * power * 0.18;
    ball.vy = Math.sin(aimAngle) * power * 0.18;
    animating = true;
    power = 0;
    updatePowerBar();
    requestAnimationFrame(update);
  }
  draw();
});

init();
</script>
</body>
</html>
