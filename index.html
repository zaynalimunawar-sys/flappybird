<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geometry Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 450;

// ── CONSTANTS ──────────────────────────────────────────────
const GROUND_Y = 370;       // top of ground
const PLAYER_SIZE = 36;
const GRAVITY = 0.7;
const JUMP_POWER = -14;
const GAME_SPEED = 3.5;     // pixels per frame (slow & fair)

// ── STATE ──────────────────────────────────────────────────
let state = 'menu';   // menu | playing | dead | win
let attempt = 1;
let camX = 0;
let canJump = false;
let jumpHeld = false;

const player = { x: 150, y: GROUND_Y - PLAYER_SIZE, vy: 0, rot: 0 };

// ── LEVEL ──────────────────────────────────────────────────
// Each object: { type: 'spike'|'block'|'platform', x, y, w, h }
function makeLevel() {
  const lvl = [];
  // Helper: push spike at world x
  function spike(x) {
    lvl.push({ type: 'spike', x, y: GROUND_Y - 38, w: 38, h: 38 });
  }
  function block(x, y) {
    y = y ?? GROUND_Y - 40;
    lvl.push({ type: 'block', x, y, w: 40, h: 40 });
  }
  function platform(x, y, w) {
    lvl.push({ type: 'platform', x, y, w: w ?? 80, h: 16 });
  }

  // Section 1 — warmup singles
  spike(600); spike(700); spike(820); spike(920);
  // Section 2 — double spikes
  spike(1100); spike(1144); spike(1280); spike(1324);
  // Section 3 — block jump
  block(1500); spike(1600); block(1700); spike(1800);
  // Section 4 — platform section
  platform(1950, GROUND_Y - 110, 90);
  spike(2060); spike(2120);
  // Section 5 — triple spike gauntlet
  spike(2300); spike(2344); spike(2388);
  block(2500); spike(2560); block(2620);
  // Section 6 — fast finish
  spike(2800); spike(2844); block(2960); spike(3060); spike(3104);
  platform(3200, GROUND_Y - 120, 100);
  spike(3320); spike(3364); spike(3408);
  // End marker
  lvl.push({ type: 'end', x: 3600, y: 0, w: 10, h: GROUND_Y });

  return lvl;
}

let level = makeLevel();
const LEVEL_END = 3620;

function reset() {
  player.x = 150;
  player.y = GROUND_Y - PLAYER_SIZE;
  player.vy = 0;
  player.rot = 0;
  camX = 0;
  canJump = false;
}

// ── INPUT ──────────────────────────────────────────────────
function tryJump() {
  if (state === 'menu') { state = 'playing'; reset(); return; }
  if (state === 'dead')  { attempt++; state = 'playing'; reset(); return; }
  if (state === 'win')   { attempt = 1; state = 'playing'; reset(); return; }
  if (state === 'playing' && canJump) {
    player.vy = JUMP_POWER;
    canJump = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); tryJump(); }
});
canvas.addEventListener('mousedown', tryJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); tryJump(); }, { passive: false });

// ── HELPERS ────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── UPDATE ─────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  // scroll
  camX += GAME_SPEED;

  // gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // rotate in air
  const onGround = player.y >= GROUND_Y - PLAYER_SIZE;
  if (!onGround) {
    player.rot += 4.5;
  } else {
    // snap rotation to nearest 90
    player.rot = Math.round(player.rot / 90) * 90;
    player.y = GROUND_Y - PLAYER_SIZE;
    player.vy = 0;
    canJump = true;
  }

  // Obstacle collision
  for (const o of level) {
    const sx = o.x - camX + player.x; // screen x of obstacle relative to player screen pos
    // world-space overlap check
    const px = camX; // camera offset; player is always at screen x=150, world x = camX + (150 - player.x offset)
    // player world bounds
    const pwx = camX - 150 + player.x; // actually let's keep player.x fixed at 150 screen
    // player screen x is always 150
    const PSX = 150, PSY = player.y;

    const osx = o.x - camX; // obstacle screen x

    if (o.type === 'end') {
      if (osx <= 150) { state = 'win'; return; }
    }

    if (o.type === 'block' || o.type === 'platform') {
      if (rectsOverlap(PSX+3, PSY+3, PLAYER_SIZE-6, PLAYER_SIZE-6, osx, o.y, o.w, o.h)) {
        // land on top?
        if (player.vy > 0 && PSY + PLAYER_SIZE - player.vy <= o.y + 5) {
          player.y = o.y - PLAYER_SIZE;
          player.vy = 0;
          canJump = true;
        } else {
          // hit side or bottom → die
          state = 'dead';
          return;
        }
      }
    }

    if (o.type === 'spike') {
      // tighter hitbox for spikes (fairness)
      if (rectsOverlap(PSX+8, PSY+8, PLAYER_SIZE-16, PLAYER_SIZE-16, osx+7, o.y+10, o.w-14, o.h-12)) {
        state = 'dead';
        return;
      }
    }
  }
}

// ── DRAW ───────────────────────────────────────────────────
function drawBG() {
  // Sky
  const g = ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#0a0a2a');
  g.addColorStop(1,'#1a1a5e');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Moving grid lines on sky
  ctx.strokeStyle = 'rgba(100,100,255,0.08)';
  ctx.lineWidth = 1;
  const grid = 60;
  const ox = camX % grid;
  for (let x = -ox; x < canvas.width; x += grid) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GROUND_Y); ctx.stroke();
  }
  for (let y = 0; y < GROUND_Y; y += grid) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function drawGround() {
  ctx.fillStyle = '#1a7a1a';
  ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
  ctx.fillStyle = '#22aa22';
  ctx.fillRect(0, GROUND_Y, canvas.width, 6);
  // tiles
  ctx.strokeStyle = '#155a15';
  ctx.lineWidth = 1;
  const t = 40, off = camX % t;
  for (let x = -off; x < canvas.width; x += t) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = GROUND_Y; y < canvas.height; y += t) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function drawSpike(sx, o) {
  ctx.fillStyle = '#ff3333';
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx, o.y + o.h);
  ctx.lineTo(sx + o.w/2, o.y);
  ctx.lineTo(sx + o.w, o.y + o.h);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // highlight
  ctx.fillStyle = 'rgba(255,180,180,0.3)';
  ctx.beginPath();
  ctx.moveTo(sx + o.w/2, o.y + 5);
  ctx.lineTo(sx + o.w/2 - 5, o.y + o.h - 8);
  ctx.lineTo(sx + o.w/2 + 2, o.y + o.h - 4);
  ctx.closePath(); ctx.fill();
}

function drawBlock(sx, o) {
  ctx.fillStyle = '#4477ff';
  ctx.fillRect(sx, o.y, o.w, o.h);
  ctx.strokeStyle = '#2255cc';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, o.y, o.w, o.h);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(sx+4, o.y+4, o.w-8, 10);
}

function drawPlatform(sx, o) {
  ctx.fillStyle = '#ffaa00';
  ctx.fillRect(sx, o.y, o.w, o.h);
  ctx.strokeStyle = '#cc7700';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, o.y, o.w, o.h);
}

function drawObstacles() {
  for (const o of level) {
    const sx = o.x - camX;
    if (sx < -100 || sx > canvas.width + 100) continue;
    if (o.type === 'spike')    drawSpike(sx, o);
    if (o.type === 'block')    drawBlock(sx, o);
    if (o.type === 'platform') drawPlatform(sx, o);
  }
}

function drawPlayer() {
  const sx = 150, sy = player.y;
  const cx = sx + PLAYER_SIZE/2, cy = sy + PLAYER_SIZE/2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(player.rot * Math.PI / 180);
  // cube body
  ctx.fillStyle = '#00ddff';
  ctx.fillRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
  ctx.strokeStyle = '#009bbb';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
  // inner design
  ctx.fillStyle = '#006688';
  ctx.fillRect(-PLAYER_SIZE/2+7, -PLAYER_SIZE/2+7, PLAYER_SIZE-14, PLAYER_SIZE-14);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // trail
  ctx.fillStyle = 'rgba(0,220,255,0.1)';
  ctx.fillRect(sx - 40, sy + PLAYER_SIZE - 10, 40, 8);
}

function drawHUD() {
  // progress bar
  const prog = Math.min(1, camX / (LEVEL_END - canvas.width + 150));
  const bw = 300, bx = canvas.width/2 - bw/2;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx-2, 10, bw+4, 20);
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(bx, 12, bw * prog, 16);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, 12, bw, 16);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(prog*100) + '%', canvas.width/2, 24);
  ctx.textAlign = 'left';
  ctx.font = 'bold 15px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('Attempt ' + attempt, 12, 26);
}

function drawScreen(title, sub, col) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = col;
  ctx.font = 'bold 54px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, canvas.width/2, canvas.height/2 - 30);
  ctx.fillStyle = '#eee';
  ctx.font = '20px Arial';
  ctx.fillText(sub, canvas.width/2, canvas.height/2 + 20);
  ctx.fillStyle = '#aaa';
  ctx.font = '15px Arial';
  ctx.fillText('Click, tap or SPACE to continue', canvas.width/2, canvas.height/2 + 52);
  ctx.textAlign = 'left';
}

// ── LOOP ───────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBG();
  drawGround();
  drawObstacles();
  drawPlayer();
  if (state === 'playing' || state === 'dead' || state === 'win') drawHUD();

  if (state === 'menu') drawScreen('GEOMETRY DASH', 'A Geometry Dash Clone', '#00ddff');
  if (state === 'dead')  drawScreen('YOU DIED', 'Attempt ' + attempt + ' — press to retry', '#ff4444');
  if (state === 'win')   drawScreen('LEVEL COMPLETE!', 'Finished in ' + attempt + ' attempt' + (attempt>1?'s':'') + '!', '#00ff88');

  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
