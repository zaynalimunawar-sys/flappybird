<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Invasion!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #0a0a1a, #0d0d2b, #0a1628);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: white;
    overflow: hidden;
  }
  #game-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #title {
    font-family: 'Fredoka One', cursive;
    font-size: 40px;
    color: #00ffcc;
    text-shadow: 0 0 20px rgba(0,255,200,0.6), 0 0 40px rgba(0,255,200,0.3);
    letter-spacing: 3px;
  }
  #hud { display: flex; gap: 12px; align-items: center; }
  .hud-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,200,0.2);
    border-radius: 16px;
    padding: 10px 22px;
    text-align: center;
    min-width: 95px;
  }
  .hud-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .hud-value { font-family: 'Fredoka One', cursive; font-size: 28px; color: #00ffcc; line-height: 1; }
  .hud-divider { width: 2px; height: 50px; background: rgba(255,255,255,0.07); border-radius: 2px; }
  #canvas-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 3px rgba(0,255,200,0.2);
  }
  canvas { display: block; }
  #lives-bar { display: flex; gap: 8px; align-items: center; }
  #lives-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
  .heart { font-size: 22px; transition: all 0.3s; }
  .heart.lost { opacity: 0.2; filter: grayscale(1); transform: scale(0.8); }
  #message-box { height: 42px; display: flex; align-items: center; justify-content: center; }
  #message {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: #00ffcc;
    opacity: 0;
    transform: translateY(8px) scale(0.9);
    transition: all 0.35s ease;
  }
  #message.show { opacity: 1; transform: translateY(0) scale(1); }
  #hint { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }

  /* Overlay */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center;
  }
  #overlay.show { display: flex; }
  #overlay-box {
    background: linear-gradient(135deg, #0d1b2a, #0a0f1e);
    border: 2px solid rgba(0,255,200,0.3);
    border-radius: 24px;
    padding: 44px 64px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(0,255,200,0.1);
  }
  #overlay-title { font-family: 'Fredoka One', cursive; font-size: 44px; color: #00ffcc; margin-bottom: 6px; }
  #overlay-sub { font-size: 15px; color: rgba(255,255,255,0.45); margin-bottom: 18px; }
  #overlay-score { font-family: 'Fredoka One', cursive; font-size: 68px; color: #fff; margin-bottom: 8px; }
  #overlay-best { font-family: 'Fredoka One', cursive; font-size: 20px; color: #ffd700; margin-bottom: 28px; }
  #restartBtn {
    padding: 14px 52px; font-size: 18px; font-family: 'Fredoka One', cursive;
    background: linear-gradient(135deg, #00ffcc, #00cc99);
    color: #0a0f1e; border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,255,200,0.3); transition: all 0.2s;
  }
  #restartBtn:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(0,255,200,0.5); }
</style>
</head>
<body>
<div id="game-container">
  <div id="title">👾 Alien Invasion!</div>
  <div id="hud">
    <div class="hud-card"><div class="hud-label">Score</div><div class="hud-value" id="scoreNum">0</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Wave</div><div class="hud-value" id="waveNum">1</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Best</div><div class="hud-value" id="bestNum">0</div></div>
  </div>
  <div id="lives-bar">
    <span id="lives-label">Lives:</span>
    <span class="heart" id="h0">❤️</span>
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="480" height="500"></canvas>
  </div>
  <div id="message-box"><div id="message"></div></div>
  <div id="hint">🖱️ Move mouse or touch to aim · Click or tap to shoot!</div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">Game Over! 👾</div>
    <div id="overlay-sub">Final Score</div>
    <div id="overlay-score">0</div>
    <div id="overlay-best"></div>
    <button id="restartBtn" onclick="restartGame()">Play Again 🚀</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let score, wave, lives, best, gameOver;
let ship, bullets, aliens, alienBullets, particles, stars;
let alienDir, alienDropping, alienMoveTimer, alienMoveInterval;
let shootCooldown, mouseX;
let shakeFrames = 0, shakeIntensity = 0;
let waveClearing = false;

const SHIP_SPEED = 5;
const BULLET_SPEED = 9;
const ALIEN_BULLET_SPEED = 3.5;

function init() {
  score = 0; wave = 1; lives = 3; gameOver = false; waveClearing = false;
  best = parseInt(localStorage.getItem('aiBest') || '0');
  ship = { x: canvas.width / 2, y: canvas.height - 55, w: 44, h: 36 };
  bullets = []; alienBullets = []; particles = [];
  mouseX = canvas.width / 2;
  shootCooldown = 0;
  buildStars();
  buildAliens();
  updateHUD();
  updateLives();
  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(loop);
}

function restartGame() { init(); }

function buildStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.01 + Math.random() * 0.02
    });
  }
}

function buildAliens() {
  aliens = [];
  alienDir = 1;
  alienDropping = false;
  alienMoveTimer = 0;
  alienMoveInterval = Math.max(18 - wave * 2, 5);

  const rows = Math.min(3 + Math.floor(wave / 2), 5);
  const cols = 8;
  const types = ['👾', '👽', '🛸'];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      aliens.push({
        x: 50 + c * 50,
        y: 40 + r * 44,
        w: 36, h: 36,
        type: types[Math.min(r, 2)],
        alive: true,
        points: (rows - r) * 10,
        frame: Math.random() * Math.PI * 2
      });
    }
  }
}

function updateHUD() {
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('waveNum').textContent = wave;
  document.getElementById('bestNum').textContent = best;
}

function updateLives() {
  for (let i = 0; i < 3; i++) {
    const h = document.getElementById('h' + i);
    h.className = 'heart' + (i >= lives ? ' lost' : '');
  }
}

function triggerShake(i, f) { shakeIntensity = i; shakeFrames = f; }

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 3 + Math.random() * 4,
      color,
      gravity: 0.08
    });
  }
}

function spawnShipExplosion(x, y) {
  spawnExplosion(x, y, '#ff6644', 30);
  spawnExplosion(x, y, '#ffcc00', 20);
  spawnExplosion(x, y, '#ffffff', 10);
}

function showMessage(text, color) {
  const msg = document.getElementById('message');
  msg.classList.remove('show');
  msg.textContent = text;
  msg.style.color = color || '#00ffcc';
  setTimeout(() => msg.classList.add('show'), 40);
  setTimeout(() => msg.classList.remove('show'), 1600);
}

// ---- Draw ----
function drawScene() {
  ctx.save();
  if (shakeFrames > 0) {
    ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
    shakeFrames--;
  }

  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Ground line
  ctx.fillStyle = 'rgba(0,255,200,0.08)';
  ctx.fillRect(0, canvas.height - 28, canvas.width, 2);

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });

  // Aliens
  aliens.filter(a => a.alive).forEach(a => {
    a.frame += 0.05;
    ctx.save();
    ctx.font = `${28 + Math.sin(a.frame) * 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Glow
    ctx.shadowBlur = 10;
    ctx.shadowColor = a.type === '🛸' ? '#ff44ff' : '#00ffcc';
    ctx.fillText(a.type, a.x + a.w/2, a.y + a.h/2);
    ctx.restore();
  });

  // Alien bullets
  alienBullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#ff4444';
    const g = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, 6);
    g.addColorStop(0, '#ff8888');
    g.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  });

  // Player bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ffcc';
    const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + 14);
    g.addColorStop(0, '#00ffcc');
    g.addColorStop(1, 'rgba(0,255,200,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(b.x - 3, b.y, 6, 14, 3);
    ctx.fill();
    ctx.restore();
  });

  // Ship
  if (!gameOver) {
    ctx.save();
    ctx.translate(ship.x, ship.y);
    // Engine glow
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#00ffcc';
    // Body
    ctx.font = '40px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚀', 0, 0);
    ctx.restore();

    // Aim line
    ctx.save();
    ctx.strokeStyle = 'rgba(0,255,200,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(ship.x, ship.y - 20);
    ctx.lineTo(ship.x, 0);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

// ---- Update ----
function updateGame() {
  if (gameOver) return;

  // Move ship toward mouse
  const diff = mouseX - ship.x;
  if (Math.abs(diff) > 2) ship.x += diff * 0.12;
  ship.x = Math.max(22, Math.min(canvas.width - 22, ship.x));

  // Auto shoot
  shootCooldown--;
  if (shootCooldown <= 0) {
    bullets.push({ x: ship.x, y: ship.y - 20 });
    shootCooldown = Math.max(12 - wave, 5);
  }

  // Move bullets
  bullets.forEach(b => b.y -= BULLET_SPEED);
  bullets = bullets.filter(b => b.y > -10);

  // Move alien bullets
  alienBullets.forEach(b => { b.y += ALIEN_BULLET_SPEED + wave * 0.3; });
  alienBullets = alienBullets.filter(b => b.y < canvas.height + 10);

  // Alien shooting
  const alive = aliens.filter(a => a.alive);
  if (alive.length > 0 && Math.random() < 0.012 + wave * 0.003) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    alienBullets.push({ x: shooter.x + shooter.w/2, y: shooter.y + shooter.h });
  }

  // Move aliens
  alienMoveTimer++;
  if (alienMoveTimer >= alienMoveInterval) {
    alienMoveTimer = 0;
    let hitEdge = false;
    alive.forEach(a => {
      a.x += alienDir * (12 + wave * 1.5);
      if (a.x <= 10 || a.x + a.w >= canvas.width - 10) hitEdge = true;
    });
    if (hitEdge) {
      alienDir *= -1;
      alive.forEach(a => { a.y += 18; });
    }
  }

  // Check alien bullet hits player
  alienBullets.forEach((b, bi) => {
    if (Math.abs(b.x - ship.x) < 20 && Math.abs(b.y - ship.y) < 20) {
      alienBullets.splice(bi, 1);
      lives--;
      updateLives();
      triggerShake(6, 16);
      spawnShipExplosion(ship.x, ship.y);
      if (lives <= 0) {
        endGame();
      } else {
        showMessage('💥 Ouch!', '#ff6644');
      }
    }
  });

  // Check player bullet hits alien
  bullets.forEach((b, bi) => {
    aliens.forEach(a => {
      if (!a.alive) return;
      if (b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h) {
        a.alive = false;
        bullets.splice(bi, 1);
        score += a.points;
        if (score > best) { best = score; localStorage.setItem('aiBest', best); }
        updateHUD();
        spawnExplosion(a.x + a.w/2, a.y + a.h/2, '#00ffcc', 14);
        triggerShake(2, 6);
        const msgs = ['💥 Got one!', '⚡ Zap!', '🎯 Direct Hit!', '✨ Boom!'];
        if (Math.random() < 0.3) showMessage(msgs[Math.floor(Math.random()*msgs.length)], '#00ffcc');
      }
    });
  });

  // Check aliens reached bottom
  alive.forEach(a => {
    if (a.y + a.h >= canvas.height - 30) {
      endGame();
    }
  });

  // Wave clear
  if (alive.length === 0 && !waveClearing) {
    waveClearing = true;
    showMessage('🎉 Wave ' + wave + ' Clear!', '#ffd700');
    triggerShake(4, 14);
    setTimeout(() => {
      wave++;
      waveClearing = false;
      buildAliens();
      updateHUD();
    }, 1800);
  }

  // Update particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.96;
    p.life--;
  });
}

function endGame() {
  gameOver = true;
  triggerShake(8, 25);
  document.getElementById('overlay-score').textContent = score;
  document.getElementById('overlay-best').textContent = best > 0 ? '🏆 Best: ' + best : '';
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 800);
}

// ---- Game Loop ----
function loop() {
  updateGame();
  drawScene();
  requestAnimationFrame(loop);
}

// ---- Controls ----
canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - r.left;
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - r.left;
}, { passive: false });

init();
</script>
</body>
</html>
