<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Among Us</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#050816;
    color:#fff;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow:hidden;
  }
  #gameWrapper{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  canvas{
    background:#050816;
    border:3px solid #3b3f66;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.7);
    touch-action:none;
  }

  /* UI */
  #ui-overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .panel{
    background:rgba(5,8,22,0.97);
    border:2px solid #4b4f8a;
    border-radius:16px;
    padding:24px 28px;
    min-width:260px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    pointer-events:auto;
  }
  .title{
    font-size:28px;
    letter-spacing:1px;
    margin-bottom:4px;
  }
  .subtitle{
    font-size:14px;
    opacity:0.8;
    margin-bottom:12px;
  }
  .role-label{
    font-size:20px;
    margin-top:4px;
    margin-bottom:12px;
  }
  .role-crewmate{color:#32f5a1;}
  .role-impostor{color:#ff4b6e;}
  button{
    background:#32f5a1;
    border:none;
    color:#021019;
    padding:10px 18px;
    border-radius:999px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin:6px 4px 0 4px;
    transition:transform 0.08s, box-shadow 0.08s, background 0.1s;
  }
  button:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(0,0,0,0.5);
  }
  button:active{
    transform:translateY(1px);
    box-shadow:none;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid #32f5a1;
    color:#32f5a1;
  }
  #infoText{
    font-size:13px;
    opacity:0.85;
    margin-top:10px;
  }
  #topText{
    position:fixed;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    opacity:0.9;
    text-shadow:0 0 4px #000;
    pointer-events:none;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="game" width="900" height="540"></canvas>
</div>

<div id="ui-overlay">
  <div id="homePanel" class="panel">
    <div class="title">Mini Skeld</div>
    <div class="subtitle">A tiny impostor vs crewmates demo</div>
    <p style="font-size:14px;margin-bottom:10px;">
      Move with WASD or arrow keys. As impostor, walk near a crewmate and press <b>K</b> to eliminate them.
    </p>
    <p style="font-size:14px;margin-bottom:12px;">
      Win as crewmate by surviving the timer. Win as impostor by eliminating enough crewmates.
    </p>
    <button id="btnPlay">Start Game</button>
  </div>

  <div id="rolePanel" class="panel" style="display:none;">
    <div class="title">Your Role</div>
    <div id="roleLabel" class="role-label"></div>
    <div id="roleDesc" class="subtitle"></div>
    <button id="btnBegin">Begin</button>
  </div>

  <div id="endPanel" class="panel" style="display:none;">
    <div class="title" id="endTitle"></div>
    <div id="endReason" class="subtitle"></div>
    <button id="btnRestart">Play Again</button>
    <button id="btnHome" class="btn-ghost">Home</button>
  </div>
</div>

<div id="topText"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

const homePanel = document.getElementById('homePanel');
const rolePanel = document.getElementById('rolePanel');
const endPanel  = document.getElementById('endPanel');
const roleLabel = document.getElementById('roleLabel');
const roleDesc  = document.getElementById('roleDesc');
const endTitle  = document.getElementById('endTitle');
const endReason = document.getElementById('endReason');
const topText   = document.getElementById('topText');

document.getElementById('btnPlay').onclick = startRoleReveal;
document.getElementById('btnBegin').onclick = () => { rolePanel.style.display='none'; startRound(); };
document.getElementById('btnRestart').onclick = () => { endPanel.style.display='none'; startRoleReveal(); };
document.getElementById('btnHome').onclick = () => {
  endPanel.style.display='none';
  homePanel.style.display='block';
};

let state = 'home'; // home, reveal, playing, ended
let player = null;
let npcs = [];
let timer = 60;
let lastTime = 0;
let keys = {};
let isImpostor = false;
let kills = 0;
let requiredKills = 3;

// simple rectangle walls for pathing (corridors)
const walls = [
  // outer ship
  {x:60, y:60, w:W-120, h:20},
  {x:60, y:H-80, w:W-120, h:20},
  {x:60, y:60, w:20, h:H-120},
  {x:W-80, y:60, w:20, h:H-120},

  // middle cross corridors
  {x:W/2-40, y:120, w:80, h:H-240},
  {x:200, y:H/2-35, w:W-400, h:70}
];

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'Spacebar') e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

function startRoleReveal(){
  state = 'reveal';
  homePanel.style.display='none';
  // randomly choose impostor or crewmate (50/50)
  isImpostor = Math.random() < 0.5;
  if(isImpostor){
    roleLabel.textContent = 'Impostor';
    roleLabel.className = 'role-label role-impostor';
    roleDesc.textContent = 'Fake your innocence. Walk close to crewmates and press K to eliminate them.';
  }else{
    roleLabel.textContent = 'Crewmate';
    roleLabel.className = 'role-label role-crewmate';
    roleDesc.textContent = 'Avoid suspicious players and survive until the timer ends.';
  }
  rolePanel.style.display='block';
}

function startRound(){
  state = 'playing';
  kills = 0;
  timer = 60;
  topText.textContent = '';
  initEntities();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function initEntities(){
  player = createActor(120, H/2, isImpostor ? '#ff4b6e' : '#32f5a1', true);
  npcs = [];
  const npcCount = 6;
  for(let i=0;i<npcCount;i++){
    const x = 200 + i*70;
    const y = 130 + (i%2)*200;
    const npc = createActor(x, y, '#52a9ff', false);
    npc.id = i;
    npc.thinkCooldown = Math.random()*1000;
    npc.target = randomCorridorPoint();
    npcs.push(npc);
  }
}

function createActor(x,y,color,isPlayer){
  return {
    x,y,
    vx:0,vy:0,
    radius:16,
    color,
    isPlayer,
    alive:true,
  };
}

function update(dt){
  if(state!=='playing') return;
  const sec = dt/1000;

  // timer
  timer -= sec;
  if(timer <= 0){
    timer = 0;
    if(isImpostor && kills < requiredKills){
      endGame(false,'Time is up. You failed to eliminate enough crewmates.');
    }else if(!isImpostor){
      endGame(true,'You survived the round!');
    }else{
      endGame(true,'You ran out the clock after causing chaos.');
    }
  }

  // update player movement
  const speed = 140;
  let ax = 0, ay = 0;
  if(keys['w'] || keys['arrowup']) ay -= 1;
  if(keys['s'] || keys['arrowdown']) ay += 1;
  if(keys['a'] || keys['arrowleft']) ax -= 1;
  if(keys['d'] || keys['arrowright']) ax += 1;
  const len = Math.hypot(ax,ay) || 1;
  ax /= len; ay /= len;
  player.vx = ax*speed;
  player.vy = ay*speed;
  moveWithWalls(player, sec);

  // kill input
  if(isImpostor && keys['k']){
    tryKill();
  }

  // NPC AI
  npcs.forEach(npc=>{
    if(!npc.alive) return;
    npc.thinkCooldown -= dt;
    if(npc.thinkCooldown <= 0){
      npc.thinkCooldown = 600 + Math.random()*900;
      // choose new target
      if(!isImpostor){
        // as crewmate, they wander corridors
        npc.target = randomCorridorPoint();
      }else{
        // still just wandering to look alive
        npc.target = randomCorridorPoint();
      }
    }
    if(npc.target){
      const dx = npc.target.x - npc.x;
      const dy = npc.target.y - npc.y;
      const d = Math.hypot(dx,dy) || 1;
      const ns = 90;
      npc.vx = dx/d*ns;
      npc.vy = dy/d*ns;
      if(d < 8) npc.target = randomCorridorPoint();
    }
    // basic avoidance from player (if player too close)
    const pdx = player.x - npc.x;
    const pdy = player.y - npc.y;
    const pd = Math.hypot(pdx,pdy);
    if(pd < 50){
      npc.vx -= (pdx/pd)*40;
      npc.vy -= (pdy/pd)*40;
    }
    moveWithWalls(npc, sec);
  });

  // impostor lose if all npcs dead? (actually win)
  const aliveCrew = npcs.filter(n=>n.alive).length;
  if(isImpostor && aliveCrew === 0){
    endGame(true,'You eliminated all crewmates!');
  }

  // crewmate lose if impostor gets enough kills
  if(!isImpostor && kills >= requiredKills){
    endGame(false,'The impostor eliminated too many crewmates.');
  }

  // update top text
  const roleText = isImpostor ? 'IMPOSTOR' : 'CREWMATE';
  const color = isImpostor ? '#ff4b6e' : '#32f5a1';
  topText.innerHTML =
    `<span style="color:${color};font-weight:700;">${roleText}</span> `+
    `| Time: ${timer.toFixed(0)} | Kills: ${kills}/${requiredKills} | Crew left: ${aliveCrew}`;
}

function tryKill(){
  // basic cooldown via key release
  if(!keys['_killLatch']){ // custom flag on keys
    keys['_killLatch'] = true;
    let target = null;
    let bestDist = 9999;
    npcs.forEach(n=>{
      if(!n.alive) return;
      const d = Math.hypot(n.x-player.x, n.y-player.y);
      if(d < 45 && d < bestDist){
        bestDist = d;
        target = n;
      }
    });
    if(target){
      target.alive = false;
      kills++;
      // quick flash effect
      canvas.style.filter = 'contrast(1.4) saturate(1.4)';
      setTimeout(()=>canvas.style.filter='none',120);
    }
  }
}
window.addEventListener('keyup',e=>{
  if(e.key.toLowerCase()==='k') keys['_killLatch']=false;
});

function moveWithWalls(a, dt){
  let nx = a.x + a.vx*dt;
  let ny = a.y + a.vy*dt;

  // keep in bounds
  const r = a.radius;
  if(nx < r) nx = r;
  if(nx > W-r) nx = W-r;
  if(ny < r) ny = r;
  if(ny > H-r) ny = H-r;

  // simple AABB vs circle "push out" for each wall
  let cx = nx;
  let cy = ny;
  walls.forEach(w=>{
    const closestX = clamp(cx, w.x, w.x+w.w);
    const closestY = clamp(cy, w.y, w.y+w.h);
    const dx = cx - closestX;
    const dy = cy - closestY;
    const dist = Math.hypot(dx,dy);
    if(dist < r){
      const overlap = r - dist || r;
      const ux = dx/(dist||1);
      const uy = dy/(dist||1);
      cx += ux*overlap;
      cy += uy*overlap;
    }
  });

  a.x = cx;
  a.y = cy;
}

function clamp(v,min,max){ return v<min?min:v>max?max:v; }

function randomCorridorPoint(){
  const area = walls[4]; // middle horizontal corridor
  const x = area.x + 30 + Math.random()*(area.w-60);
  const y = area.y + 10 + (Math.random()<0.5?-60:60);
  return {x,y};
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // spacey background
  const grd = ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,W/1.3);
  grd.addColorStop(0,'#11172b');
  grd.addColorStop(1,'#050816');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // stars
  ctx.fillStyle = '#ffffff11';
  for(let i=0;i<40;i++){
    const x = (i*73)%W;
    const y = (i*157)%H;
    ctx.fillRect(x,y,2,2);
  }

  // ship floor
  ctx.fillStyle = '#161c32';
  ctx.fillRect(60,60,W-120,H-120);

  // corridors
  ctx.fillStyle = '#1f2745';
  walls.forEach(w=>{
    ctx.fillRect(w.x,w.y,w.w,w.h);
  });

  // rooms just as hints
  ctx.fillStyle = '#202a52';
  ctx.fillRect(80,80,140,160);              // "Navigation"
  ctx.fillRect(W-220,80,140,160);          // "Reactor"
  ctx.fillRect(80,H-260,180,160);          // "Storage"
  ctx.fillRect(W-260,H-260,180,160);       // "Electrical"

  drawRoomText('NAV', 150,150);
  drawRoomText('REACTOR', W-150,150);
  drawRoomText('STORAGE', 150,H-200);
  drawRoomText('ELEC', W-150,H-200);

  // NPCs
  npcs.forEach(n=>{
    if(!n.alive) return;
    drawCrewmate(n, '#52a9ff');
  });

  // player
  if(player){
    drawCrewmate(player, player.color);
  }
}

function drawRoomText(text,x,y){
  ctx.save();
  ctx.fillStyle = '#ffffff35';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(text,x,y);
  ctx.restore();
}

function drawCrewmate(a, color){
  const r = a.radius;
  const bodyH = r*2.1;
  const bodyW = r*1.4;
  const top = a.y - bodyH/2;
  const left = a.x - bodyW/2;

  // backpack
  ctx.fillStyle = shade(color,-30);
  ctx.beginPath();
  ctx.roundRect(left-bodyW*0.35, top+bodyH*0.25, bodyW*0.5, bodyH*0.55, 8);
  ctx.fill();

  // body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(left, top, bodyW, bodyH, 12);
  ctx.fill();

  // legs
  ctx.beginPath();
  ctx.roundRect(left+2, top+bodyH*0.7, bodyW*0.45, bodyH*0.35, 8);
  ctx.roundRect(left+bodyW-2-bodyW*0.45, top+bodyH*0.7, bodyW*0.45, bodyH*0.35, 8);
  ctx.fill();

  // visor
  ctx.fillStyle = '#b7e7ff';
  ctx.beginPath();
  ctx.roundRect(left+bodyW*0.15, top+bodyH*0.25, bodyW*0.8, bodyH*0.35, 10);
  ctx.fill();
  ctx.fillStyle = '#ffffff99';
  ctx.beginPath();
  ctx.ellipse(left+bodyW*0.45, top+bodyH*0.3, bodyW*0.25, bodyH*0.09, 0, 0, Math.PI*2);
  ctx.fill();
}

function shade(col, amt){
  let r = parseInt(col.slice(1,3),16);
  let g = parseInt(col.slice(3,5),16);
  let b = parseInt(col.slice(5,7),16);
  r = clamp(r+amt,0,255);
  g = clamp(g+amt,0,255);
  b = clamp(b+amt,0,255);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function endGame(playerWin, reason){
  if(state!=='playing') return;
  state = 'ended';
  endTitle.textContent = playerWin ? 'Victory' : 'Defeat';
  endReason.textContent = reason;
  endPanel.style.display='block';
}

function loop(t){
  const dt = t-lastTime;
  lastTime = t;
  update(dt);
  draw();
  if(state==='playing') requestAnimationFrame(loop);
}
draw(); // initial frame
</script>
</body>
</html>
