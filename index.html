<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Pathogen X - Upgraded</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(ellipse at center, #050f05 0%, #000 100%); 
            color: #c8f0c8; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            user-select: none; 
            position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: 
                radial-gradient(circle at 20% 80%, rgba(0,255,102,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,255,102,0.03) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes bgShift { 0% { transform: translate(0,0); } 100% { transform: translate(50px, -50px); } }

        .screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; pointer-events: auto; backdrop-filter: blur(2px);
        }
        .screen.active { display: flex; }

        /* MENU SCREEN - Enhanced with particles */
        #menuScreen { flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(ellipse at center, #0a1f0a 0%, #000 100%);
        }
        .logo-icon { font-size: clamp(60px, 20vw, 100px); animation: pulseGlow 2s infinite; margin-bottom: 15px; }
        @keyframes pulseGlow { 
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0,255,102,0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(0,255,102,0.9)); }
        }
        .logo-title { 
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 8vw, 4rem); 
            color: #00ff66; text-shadow: 0 0 30px rgba(0,255,102,0.8); letter-spacing: 6px; 
            animation: titleFloat 3s ease-in-out infinite;
        }
        @keyframes titleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .logo-sub { color: #3a7a3a; font-size: 1rem; letter-spacing: 4px; margin: 10px 0 40px; }

        .menu-btns { display: flex; flex-direction: column; gap: 15px; width: clamp(260px, 40vw, 300px); }
        .mbtn { 
            width: 100%; padding: 18px 0; border: none; border-radius: 12px; 
            font-family: 'Orbitron', sans-serif; font-size: clamp(0.9rem, 2.5vw, 1.1rem); 
            letter-spacing: 2.5px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1); 
            text-transform: uppercase; position: relative; overflow: hidden;
        }
        .mbtn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .mbtn:hover::before { left: 100%; }
        .mbtn-primary { 
            background: linear-gradient(135deg, #00cc55, #008833); color: #000; font-weight: 800; 
            box-shadow: 0 8px 25px rgba(0,204,85,0.4);
        }
        .mbtn-primary:hover { 
            background: linear-gradient(135deg, #00ff66, #00aa44); transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 12px 35px rgba(0,255,102,0.6);
        }
        .mbtn-secondary { background: rgba(10,26,10,0.8); color: #44bb66; border: 2px solid #225533; }
        .mbtn-secondary:hover { background: rgba(15,42,15,0.9); border-color: #44bb66; transform: translateY(-2px); }

        #howToPlay { display: none; margin-top: 20px; background: rgba(10,26,10,0.9); border: 2px solid #1a3a1a; 
            border-radius: 12px; padding: 20px 25px; max-width: 340px; color: #5aaa5a; font-size: 0.85rem; 
            line-height: 1.7; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* NAME SCREEN - Card with glassmorphism */
        #nameScreen { flex-direction: column; align-items: center; justify-content: center; }
        .ns-card { 
            background: rgba(10,26,10,0.85); border: 2px solid rgba(26,58,26,0.6); 
            border-radius: 20px; padding: 35px 40px; max-width: 520px; width: 92%; 
            backdrop-filter: blur(10px); box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .ns-card h2 { font-family: 'Orbitron', sans-serif; color: #00ff66; font-size: clamp(1.2rem, 4vw, 1.6rem); margin-bottom: 8px; }
        .ns-hint { color: #3a7a3a; font-size: 0.85rem; margin-bottom: 25px; }
        .field-label { color: #44aa66; font-size: 0.8rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
        #virusName { 
            width: 100%; background: rgba(5,15,5,0.9); border: 2px solid #225533; border-radius: 10px; 
            color: #00ff88; font-family: 'Inter', sans-serif; font-size: 1.1rem; padding: 15px 20px; 
            outline: none; margin-bottom: 25px; letter-spacing: 2px; transition: all 0.3s;
        }
        #virusName:focus { border-color: #00ff66; box-shadow: 0 0 0 4px rgba(0,255,102,0.2); transform: scale(1.01); }
        #virusName::placeholder { color: rgba(26,58,26,0.8); }

        .type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .type-card { 
            background: rgba(5,15,5,0.9); border: 2px solid rgba(26,58,26,0.7); border-radius: 12px; 
            padding: 15px 18px; cursor: pointer; transition: all 0.25s cubic-bezier(0.25,0.8,0.25,1); 
            text-align: center;
        }
        .type-card:hover { border-color: #44aa66; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(68,170,102,0.3); }
        .type-card.active { border-color: #00ff66; background: rgba(3,26,8,0.95); box-shadow: 0 0 0 4px rgba(0,255,102,0.4); }
        .tc-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .tc-name { font-family: 'Orbitron', sans-serif; color: #00ff88; font-size: 0.85rem; margin-top: 5px; }
        .tc-tag { color: #3a7a3a; font-size: 0.7rem; margin-top: 4px; }

        #typeDesc { background: rgba(5,15,5,0.9); border-radius: 10px; padding: 12px 18px; color: #44aa66; 
            font-size: 0.82rem; line-height: 1.7; min-height: 45px; margin-bottom: 20px; }

        .ns-footer { display: flex; gap: 15px; }
        .ns-footer .mbtn { flex: 1; font-size: clamp(0.8rem, 2vw, 1rem); }

        /* GAME SCREEN - Modern HUD with icons */
        #gameScreen { flex-direction: column; }
        #hud { 
            display: flex; align-items: center; gap: 10px; padding: 12px 20px; 
            background: rgba(0,0,0,0.9); border-bottom: 3px solid #0d2a0d; flex-shrink: 0; 
            flex-wrap: wrap; backdrop-filter: blur(5px);
        }
        #virusLabel { 
            font-family: 'Orbitron', sans-serif; color: #00ff66; font-size: clamp(0.6rem, 2vw, 0.9rem); 
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            text-shadow: 0 0 10px rgba(0,255,102,0.5);
        }
        .hud-stat { 
            display: flex; flex-direction: column; align-items: center; 
            background: rgba(10,26,10,0.9); border: 2px solid rgba(26,58,26,0.6); border-radius: 10px; 
            padding: 8px 12px; min-width: 75px; transition: all 0.3s;
        }
        .hud-stat:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,255,102,0.3); }
        .hs-lbl { font-size: 0.55rem; color: #3a7a3a; text-transform: uppercase; letter-spacing: 1px; }
        .hs-val { font-family: 'Orbitron', sans-serif; font-size: clamp(0.7rem, 2.2vw, 0.95rem); font-weight: 800; margin-top: 2px; }
        .hs-i .hs-val { color: #00ff88; text-shadow: 0 0 8px rgba(0,255,136,0.7); }
        .hs-d .hs-val { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.7); }
        .hs-h .hs-val { color: #88ccff; }
        .hs-dna .hs-val { color: #ffdd00; text-shadow: 0 0 8px rgba(255,221,0,0.8); }
        .hud-virus-btn { 
            background: linear-gradient(135deg, #003311, #005522); border: 2px solid #00aa44; border-radius: 10px; 
            color: #00ff88; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; padding: 10px 15px; 
            cursor: pointer; letter-spacing: 1.5px; transition: all 0.25s; white-space: nowrap;
        }
        .hud-virus-btn:hover { 
            background: linear-gradient(135deg, #005522, #008833); border-color: #00ff66; 
            transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 25px rgba(0,255,102,0.5);
        }

        /* MAP AREA - Enhanced SVG with glows */
        #mapArea { position: relative; flex: 1; overflow: hidden; }
        #svgMap { width: 100%; height: 100%; display: block; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        #bubbleLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #dnaPopups { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #msgLog { 
            position: absolute; bottom: 10px; right: 12px; text-align: right; pointer-events: none; z-index: 10; 
            max-width: 280px; max-height: 120px; overflow: hidden;
        }
        .msg-item { 
            background: rgba(0,0,0,0.9); border-left: 4px solid #00ff66; color: #88ff88; font-size: 0.7rem; 
            padding: 6px 12px; margin: 4px 0; display: block; animation: fadeMsg 5s forwards; 
            border-radius: 0 8px 8px 0; backdrop-filter: blur(5px);
        }
        @keyframes fadeMsg { 0%, 70% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(20px); } }

        /* CURE BAR - Progress ring style */
        #cureBarWrap { 
            padding: 10px 20px; background: rgba(0,0,0,0.9); border-top: 2px solid #1a1a3a; flex-shrink: 0; 
            display: flex; align-items: center; gap: 15px; backdrop-filter: blur(5px);
        }
        .cure-icon { font-size: 1.2rem; flex-shrink: 0; filter: drop-shadow(0 0 10px rgba(136,204,255,0.6)); }
        .cure-track { flex: 1; }
        .ctl { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .ctl span { font-size: 0.7rem; color: #8888cc; }
        .ctl b { font-family: 'Orbitron', sans-serif; color: #aaaaff; font-size: 0.8rem; }
        .cure-ring { 
            width: 60px; height: 60px; border-radius: 50%; background: conic-gradient(#3333cc var(--progress, 0deg), #0a0a2a 0deg); 
            display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto;
        }
        .cure-ring-inner { 
            width: 40px; height: 40px; border-radius: 50%; background: #050f05; 
            display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; 
            font-size: 0.85rem; color: #88ccff; font-weight: 700;
        }

        /* VIRUS MENU - Modal with tabs and particles */
        #virusMenu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            z-index: 150; display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(8px);
        }
        #virusMenu.active { display: flex; }
        #vmBox { 
            background: rgba(8,15,8,0.98); border: 3px solid #00aa44; border-radius: 20px; 
            width: min(700px, 96vw); max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 0 80px rgba(0,170,68,0.5), 0 30px 80px rgba(0,0,0,0.9); animation: modalSlide 0.4s ease-out;
        }
        @keyframes modalSlide { from { opacity: 0; transform: scale(0.9) translateY(50px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        #vmHeader { 
            background: linear-gradient(90deg, #003311, #005522); padding: 18px 25px; display: flex; align-items: center; gap: 15px; 
            flex-shrink: 0; position: relative; overflow: hidden;
        }
        #vmHeader::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00ff66, transparent); }
        .vm-icon { font-size: 2.2rem; filter: drop-shadow(0 0 15px currentColor); }
        .vm-title { 
            font-family: 'Orbitron', sans-serif; color: #00ff66; font-size: clamp(1rem, 3vw, 1.3rem); 
            letter-spacing: 3px; text-shadow: 0 0 15px rgba(0,255,102,0.8);
        }
        .vm-dna-badge { 
            margin-left: auto; background: linear-gradient(135deg, #1a1400, #332200); border: 2px solid #554400; 
            border-radius: 25px; padding: 8px 18px; font-family: 'Orbitron', sans-serif; color: #ffdd00; 
            font-size: 0.9rem; box-shadow: 0 5px 20px rgba(255,221,0,0.4); animation: dnaPulse 2s infinite;
        }
        @keyframes dnaPulse { 0%, 100% { box-shadow: 0 5px 20px rgba(255,221,0,0.4); } 50% { box-shadow: 0 5px 30px rgba(255,221,0,0.7); } }

        #vmClose { 
            background: transparent; border: 2px solid #225533; border-radius: 8px; color: #44aa66; 
            font-size: 0.8rem; padding: 10px 15px; cursor: pointer; font-family: 'Orbitron', sans-serif; 
            margin-left: 12px; transition: all 0.3s;
        }
        #vmClose:hover { border-color: #00ff66; color: #00ff66; transform: scale(1.05); background: rgba(0,255,102,0.1); }

        #vmTabs { display: flex; gap: 0; border-bottom: 2px solid #1a3a1a; flex-shrink: 0; overflow-x: auto; }
        .vm-tab { 
            flex: 1; padding: 14px 12px; background: transparent; border: none; border-bottom: 3px solid transparent; 
            color: #3a7a3a; font-family: 'Orbitron', sans-serif; font-size: clamp(0.6rem, 1.6vw, 0.75rem); 
            cursor: pointer; letter-spacing: 1.5px; transition: all 0.3s; white-space: nowrap; text-transform: uppercase;
        }
        .vm-tab:hover { color: #44aa66; background: rgba(10,26,10,0.8); }
        .vm-tab.active { color: #00ff66; border-bottom-color: #00ff66; background: rgba(3,26,8,0.9); }

        #vmContent { flex: 1; overflow-y: auto; padding: 20px 25px; }
        #vmContent::-webkit-scrollbar { width: 6px; }
        #vmContent::-webkit-scrollbar-track { background: #050f05; }
        #vmContent::-webkit-scrollbar-thumb { background: #225533; border-radius: 3px; }

        .vm-section-title { 
            font-family: 'Orbitron', sans-serif; color: #44aa66; font-size: 0.75rem; letter-spacing: 3px; 
            text-transform: uppercase; margin: 15px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #1a3a1a;
        }
        .evo-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .evo-card { 
            background: rgba(10,20,10,0.9); border: 2px solid rgba(26,58,26,0.7); border-radius: 16px; 
            padding: 18px 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1); 
            text-align: center; position: relative; overflow: hidden;
        }
        .evo-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: radial-gradient(circle, rgba(0,255,102,0.1) 0%, transparent 70%); 
            opacity: 0; transition: opacity 0.3s;
        }
        .evo-card:hover:not(.disabled)::before { opacity: 1; }
        .evo-card:hover:not(.disabled) { border-color: #44aa66; transform: translateY(-5px) rotate(1deg); box-shadow: 0 15px 40px rgba(68,170,102,0.4); }
        .evo-card.can-buy { border-color: #00aa44; background: rgba(3,26,8,0.95); }
        .evo-card.can-buy:hover { border-color: #00ff66; box-shadow: 0 15px 40px rgba(0,255,102,0.6); }
        .evo-card.maxed { border-color: #ff6600; background: rgba(26,8,0,0.9); cursor: default; }
        .evo-card.disabled { opacity: 0.4; cursor: default; }
        .ec-icon { font-size: 2.5rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px currentColor); transition: transform 0.3s; }
        .evo-card:hover .ec-icon { transform: scale(1.1) rotate(5deg); }
        .ec-name { font-family: 'Orbitron', sans-serif; color: #00ff88; font-size: 0.75rem; margin-bottom: 6px; }
        .ec-desc { color: #3a7a3a; font-size: 0.68rem; line-height: 1.6; margin-bottom: 10px; }
        .ec-cost { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: #ffdd00; font-weight: 700; }
        .ec-lv { position: absolute; top: 10px; right: 12px; font-size: 0.65rem; color: #3a6a3a; font-family: 'Orbitron', sans-serif; }
        .ec-stars { color: #ffcc00; font-size: 0.85rem; margin-bottom: 6px; }
        .ec-maxbadge { 
            background: #ff6600; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; 
            padding: 4px 10px; border-radius: 15px; display: inline-block; animation: shake 0.5s infinite;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .ec-effect { font-size: 0.65rem; color: #00cc66; margin-top: 5px; font-style: italic; }

        /* BUBBLES - Particles on pop */
        .bubble { 
            position: absolute; border-radius: 50%; cursor: pointer; pointer-events: auto; 
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem; 
            transition: transform 0.12s; box-shadow: 0 0 20px currentColor; animation: bubbleFloat 3s ease-in-out infinite;
        }
        @keyframes bubbleFloat { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
        .bubble:hover { transform: scale(1.2); }
        .bubble.active { transform: scale(0.9); }
        .bubble.bubble-pop { animation: bubblePop 0.4s cubic-bezier(0.25,0.8,0.25,1) forwards !important; }
        @keyframes bubblePop { 
            0% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.3); opacity: 0.8; box-shadow: 0 0 40px currentColor; }
            100% { transform: scale(2); opacity: 0; }
        }
        .dna-pop { 
            position: absolute; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; 
            pointer-events: none; animation: floatUp 1.2s cubic-bezier(0.25,0.8,0.25,1) forwards; 
            text-shadow: 0 0 12px currentColor; filter: drop-shadow(0 0 10px currentColor);
        }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }

        /* NEWS OVERLAY - Breaking news with urgency */
        #newsOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); 
            z-index: 200; display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(10px);
        }
        #newsOverlay.active { display: flex; }
        #newsBox { 
            background: rgba(13,13,13,0.98); border: 3px solid #cc2200; border-radius: 20px; 
            max-width: 480px; width: 92%; overflow: hidden; box-shadow: 0 0 80px rgba(204,34,0,0.6); 
            animation: newsSlide 0.5s ease-out;
        }
        @keyframes newsSlide { from { opacity: 0; transform: scale(0.95) translateY(-30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        #newsHeader { 
            background: linear-gradient(90deg, #cc2200, #ff4400); padding: 15px 25px; display: flex; align-items: center; gap: 15px;
        }
        .live-badge { 
            background: #fff; color: #cc2200; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900; 
            padding: 4px 12px; border-radius: 5px; animation: blinkLive 1.2s infinite;
        }
        @keyframes blinkLive { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
        .news-ch { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 0.95rem; letter-spacing: 3px; }
        .news-time { margin-left: auto; color: #ffaaaa; font-size: 0.75rem; }
        #newsBody { padding: 25px 30px; }
        #newsIcon { font-size: 3.2rem; text-align: center; margin-bottom: 15px; filter: drop-shadow(0 0 20px currentColor); }
        #newsHeadline { 
            font-family: 'Orbitron', sans-serif; color: #ff5533; font-size: clamp(0.85rem, 2.5vw, 1.1rem); 
            margin-bottom: 12px; line-height: 1.4; text-align: center; text-shadow: 0 0 10px rgba(255,85,51,0.8);
        }
        #newsDivider { height: 2px; background: linear-gradient(90deg, transparent, #333, transparent); margin: 12px 0; }
        #newsText { color: #99bb99; font-size: 0.85rem; line-height: 1.75; margin-bottom: 15px; }
        .newsEffect { 
            display: flex; align-items: flex-start; gap: 10px; background: rgba(10,10,10,0.9); border-radius: 10px; 
            padding: 12px 18px; margin-bottom: 20px; border-left: 4px solid #ffdd00;
        }
        .eff-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
        .eff-text { color: #ffdd88; font-size: 0.8rem; line-height: 1.6; }
        #newsClose { 
            width: 100%; padding: 14px; background: linear-gradient(135deg, #cc2200, #aa1100); border: none; 
            border-radius: 12px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; 
            letter-spacing: 2.5px; cursor: pointer; transition: all 0.3s;
        }
        #newsClose:hover { background: linear-gradient(135deg, #ff3300, #cc1100); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(204,34,0,0.6); }

        /* TOOLTIP - Floating info */
        #tooltip { 
            position: fixed; background: rgba(10,26,10,0.95); border: 2px solid #225533; border-radius: 12px; 
            padding: 12px 18px; font-size: 0.75rem; color: #88cc88; pointer-events: none; z-index: 400; 
            max-width: 220px; line-height: 1.7; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none; animation: tooltipFade 0.3s ease-out;
        }
        @keyframes tooltipFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* END SCREEN - Victory/Defeat with stats */
        #endScreen { flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); }
        .end-card { 
            background: rgba(10,10,10,0.9); border-radius: 25px; padding: 45px 50px; max-width: 480px; width: 90%; 
            text-align: center; border: 2px solid rgba(26,26,26,0.8); backdrop-filter: blur(10px);
