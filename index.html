<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Invasion!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #0a0a1a, #0d0d2b, #0a1628);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: white;
    overflow: hidden;
    user-select: none;
  }
  #game-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #title {
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    color: #00ffcc;
    text-shadow: 0 0 24px rgba(0,255,200,0.6);
    letter-spacing: 3px;
  }
  #hud { display: flex; gap: 12px; align-items: center; }
  .hud-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,200,0.2);
    border-radius: 16px;
    padding: 10px 22px;
    text-align: center;
    min-width: 95px;
  }
  .hud-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .hud-value { font-family: 'Fredoka One', cursive; font-size: 28px; color: #00ffcc; line-height: 1; transition: color 0.3s; }
  .hud-divider { width: 2px; height: 50px; background: rgba(255,255,255,0.07); border-radius: 2px; }

  #lives-bar { display: flex; gap: 8px; align-items: center; }
  #lives-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
  .heart { font-size: 22px; transition: all 0.3s; }
  .heart.lost { opacity: 0.2; filter: grayscale(1); transform: scale(0.8); }

  #canvas-wrapper {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 3px rgba(0,255,200,0.2);
    cursor: crosshair;
  }
  canvas { display: block; }

  #message-box { height: 42px; display: flex; align-items: center; justify-content: center; }
  #message {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: #00ffcc;
    opacity: 0;
    transform: translateY(8px) scale(0.9);
    transition: all 0.35s ease;
  }
  #message.show { opacity: 1; transform: translateY(0) scale(1); }
  #hint { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }

  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center;
  }
  #overlay.show { display: flex; }
  #overlay-box {
    background: linear-gradient(135deg, #0d1b2a, #0a0f1e);
    border: 2px solid rgba(0,255,200,0.3);
    border-radius: 24px;
    padding: 44px 64px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }
  #overlay-title { font-family: 'Fredoka One', cursive; font-size: 44px; color: #00ffcc; margin-bottom: 6px; }
  #overlay-sub { font-size: 15px; color: rgba(255,255,255,0.45); margin-bottom: 18px; }
  #overlay-score { font-family: 'Fredoka One', cursive; font-size: 68px; color: #fff; margin-bottom: 8px; }
  #overlay-best { font-family: 'Fredoka One', cursive; font-size: 20px; color: #ffd700; margin-bottom: 28px; }
  #restartBtn {
    padding: 14px 52px; font-size: 18px; font-family: 'Fredoka One', cursive;
    background: linear-gradient(135deg, #00ffcc, #00cc99);
    color: #0a0f1e; border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,255,200,0.3); transition: all 0.2s;
  }
  #restartBtn:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(0,255,200,0.5); }
</style>
</head>
<body>
<div id="game-container">
  <div id="title">👾 Alien Invasion!</div>
  <div id="hud">
    <div class="hud-card"><div class="hud-label">Score</div><div class="hud-value" id="scoreNum">0</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Wave</div><div class="hud-value" id="waveNum">1</div></div>
    <div class="hud-divider"></div>
    <div class="hud-card"><div class="hud-label">Best</div><div class="hud-value" id="bestNum">0</div></div>
  </div>
  <div id="lives-bar">
    <span id="lives-label">Base:</span>
    <span class="heart" id="h0">❤️</span>
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h3">❤️</span>
    <span class="heart" id="h4">❤️</span>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="620" height="420"></canvas>
  </div>
  <div id="message-box"><div id="message"></div></div>
  <div id="hint">🖱️ Click or tap aliens to zap them before they reach your base!</div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">Base Destroyed! 💥</div>
    <div id="overlay-sub">Final Score</div>
    <div id="overlay-score">0</div>
    <div id="overlay-best"></div>
    <button id="restartBtn" onclick="restartGame()">Try Again 🚀</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let score, wave, lives, best, gameOver;
let aliens, particles, stars, bullets;
let spawnTimer, spawnInterval, waveKills, waveTarget;
let shakeFrames = 0, shakeIntensity = 0;
let waveTransition = false;
let clickFlashes = [];

// Lane Y positions (3 lanes)
const LANES = [120, 210, 300];
const BASE_X = 48;
const ALIEN_TYPES = [
  { emoji: '👾', hp: 1, speed: 0.6, size: 36, points: 10, color: '#00ffcc' },
  { emoji: '👽', hp: 2, speed: 0.8, size: 38, points: 20, color: '#ff44ff' },
  { emoji: '🛸', hp: 3, speed: 0.5, size: 44, points: 35, color: '#ffcc00' },
  { emoji: '🤖', hp: 4, speed: 0.4, size: 40, points: 50, color: '#ff6644' },
];

function init() {
  score = 0; wave = 1; lives = 5; gameOver = false; waveTransition = false;
  best = parseInt(localStorage.getItem('aiBest2') || '0');
  aliens = []; particles = []; bullets = []; clickFlashes = [];
  spawnTimer = 0;
  spawnInterval = 90;
  waveKills = 0;
  waveTarget = 10;
  buildStars();
  updateHUD();
  updateLives();
  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(loop);
}

function restartGame() { init(); }

function buildStars() {
  stars = [];
  for (let i = 0; i < 70; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.55,
      r: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.015 + Math.random() * 0.025
    });
  }
}

function updateHUD() {
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('waveNum').textContent = wave;
  document.getElementById('bestNum').textContent = best;
}

function updateLives() {
  for (let i = 0; i < 5; i++) {
    const h = document.getElementById('h' + i);
    h.className = 'heart' + (i >= lives ? ' lost' : '');
  }
}

function triggerShake(i, f) { shakeIntensity = i; shakeFrames = f; }

function showMessage(text, color) {
  const msg = document.getElementById('message');
  msg.classList.remove('show');
  msg.textContent = text;
  msg.style.color = color || '#00ffcc';
  setTimeout(() => msg.classList.add('show'), 30);
  setTimeout(() => msg.classList.remove('show'), 1600);
}

// ---- Spawn Alien ----
function spawnAlien() {
  const lane = LANES[Math.floor(Math.random() * LANES.length)];
  // Pick type based on wave
  const maxType = Math.min(Math.floor(wave / 2), ALIEN_TYPES.length - 1);
  const typeIdx = Math.floor(Math.random() * (maxType + 1));
  const type = ALIEN_TYPES[typeIdx];
  aliens.push({
    x: canvas.width + 30,
    y: lane,
    lane,
    hp: type.hp,
    maxHp: type.hp,
    speed: type.speed + wave * 0.04,
    size: type.size,
    emoji: type.emoji,
    points: type.points,
    color: type.color,
    frame: Math.random() * Math.PI * 2,
    hitFlash: 0,
    wobble: Math.random() * Math.PI * 2
  });
}

// ---- Particles ----
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1,
      life: 28 + Math.random() * 20,
      maxLife: 48,
      size: 3 + Math.random() * 5,
      color,
      gravity: 0.1
    });
  }
}

function spawnZap(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(a) * (1 + Math.random() * 3),
      vy: Math.sin(a) * (1 + Math.random() * 3),
      life: 14 + Math.random() * 10,
      maxLife: 24,
      size: 2 + Math.random() * 3,
      color: '#ffffff',
      gravity: 0
    });
  }
}

// ---- Draw ----
function drawScene() {
  ctx.save();
  if (shakeFrames > 0) {
    ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
    shakeFrames--;
  }

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.65);
  sky.addColorStop(0, '#050515');
  sky.addColorStop(1, '#0d1530');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.65);

  // Ground
  const gnd = ctx.createLinearGradient(0, canvas.height * 0.65, 0, canvas.height);
  gnd.addColorStop(0, '#1a3a1a');
  gnd.addColorStop(1, '#0d220d');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, canvas.height * 0.65, canvas.width, canvas.height * 0.35);

  // Ground line
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(0, canvas.height * 0.65, canvas.width, 3);

  // Stars
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Lane paths (subtle)
  LANES.forEach(ly => {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 28;
    ctx.setLineDash([30, 20]);
    ctx.beginPath();
    ctx.moveTo(BASE_X + 60, ly);
    ctx.lineTo(canvas.width, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // Base (left side)
  drawBase();

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });

  // Click flashes
  clickFlashes.forEach(f => {
    const alpha = f.life / f.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha * 0.7;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(f.x, f.y, (1 - alpha) * 30 + 5, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });

  // Bullets (laser beams from base)
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffcc';
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x + 18, b.y);
    ctx.stroke();
    ctx.restore();
  });

  // Aliens
  aliens.forEach(a => {
    a.frame += 0.04;
    a.wobble += 0.06;

    ctx.save();
    ctx.translate(a.x, a.y + Math.sin(a.wobble) * 3);

    // HP bar
    const barW = a.size + 10;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-barW/2, -a.size/2 - 12, barW, 7);
    ctx.fillStyle = a.hp === a.maxHp ? '#00ff88' : a.hp > 1 ? '#ffcc00' : '#ff4444';
    ctx.fillRect(-barW/2, -a.size/2 - 12, barW * (a.hp / a.maxHp), 7);

    // Hit flash
    if (a.hitFlash > 0) {
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, a.size / 2 + 4, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      a.hitFlash--;
    }

    // Glow
    ctx.shadowBlur = 14;
    ctx.shadowColor = a.color;

    // Emoji
    ctx.font = `${a.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(a.emoji, 0, 0);

    ctx.restore();
  });

  ctx.restore();
}

function drawBase() {
  // Base building
  ctx.save();

  // Base glow warning if lives low
  if (lives <= 2) {
    ctx.shadowBlur = 20 + Math.sin(Date.now() / 200) * 10;
    ctx.shadowColor = '#ff4444';
  }

  // Main tower
  ctx.fillStyle = '#2255aa';
  ctx.beginPath();
  ctx.roundRect(8, 80, 52, canvas.height - 160, 8);
  ctx.fill();

  // Tower highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.roundRect(10, 82, 18, canvas.height - 164, 6);
  ctx.fill();

  // Windows
  const winCols = ['#00ffcc', '#ffcc00', '#ff6644'];
  for (let i = 0; i < 5; i++) {
    const wy = 100 + i * 44;
    ctx.fillStyle = winCols[i % 3];
    ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 500 + i) * 0.3;
    ctx.beginPath();
    ctx.roundRect(18, wy, 14, 10, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(38, wy, 14, 10, 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Antenna
  ctx.strokeStyle = '#4488ff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(34, 80);
  ctx.lineTo(34, 50);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(34, 46, 7, 0, Math.PI*2);
  ctx.fillStyle = '#ff4444';
  ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 300) * 0.4;
  ctx.fill();
  ctx.globalAlpha = 1;

  // BASE label
  ctx.font = 'bold 10px Nunito';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('BASE', 34, canvas.height - 70);

  ctx.restore();
}

// ---- Update ----
function updateGame() {
  if (gameOver || waveTransition) return;

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnAlien();
  }

  // Move bullets
  bullets.forEach(b => b.x += 12);
  bullets = bullets.filter(b => b.x < canvas.width + 20);

  // Update click flashes
  clickFlashes.forEach(f => f.life--);
  clickFlashes = clickFlashes.filter(f => f.life > 0);

  // Move aliens
  aliens.forEach(a => {
    a.x -= a.speed;
  });

  // Check bullet-alien collisions
  bullets.forEach((b, bi) => {
    aliens.forEach(a => {
      const dx = b.x - a.x, dy = b.y - a.y;
      if (Math.sqrt(dx*dx + dy*dy) < a.size / 2 + 6) {
        a.hp--;
        a.hitFlash = 5;
        spawnZap(b.x, b.y);
        bullets.splice(bi, 1);
        if (a.hp <= 0) {
          killAlien(a);
        }
      }
    });
  });

  // Check aliens reaching base
  aliens.forEach((a, ai) => {
    if (a.x < BASE_X + 60) {
      aliens.splice(ai, 1);
      lives--;
      updateLives();
      triggerShake(7, 18);
      spawnExplosion(BASE_X + 40, a.y, '#ff4444', 20);
      if (lives <= 0) {
        endGame();
      } else {
        showMessage(['💥 They got through!', '😱 Base hit!', '🚨 Alert!'][Math.floor(Math.random()*3)], '#ff6644');
      }
    }
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.95;
    p.life--;
  });

  // Wave check
  if (waveKills >= waveTarget) {
    waveTransition = true;
    showMessage('🎉 Wave ' + wave + ' Clear!', '#ffd700');
    triggerShake(4, 12);
    setTimeout(() => {
      wave++;
      waveKills = 0;
      waveTarget = 10 + wave * 3;
      spawnInterval = Math.max(40 - wave * 4, 18);
      aliens = [];
      bullets = [];
      waveTransition = false;
      updateHUD();
      showMessage('👾 Wave ' + wave + ' Incoming!', '#ff44ff');
    }, 2000);
  }
}

function killAlien(a) {
  aliens = aliens.filter(al => al !== a);
  score += a.points;
  waveKills++;
  if (score > best) { best = score; localStorage.setItem('aiBest2', best); }
  updateHUD();
  spawnExplosion(a.x, a.y, a.color, 16);
  triggerShake(2, 5);
  const msgs = ['💥 Zapped!', '⚡ Got one!', '🎯 Hit!', '✨ Boom!'];
  if (Math.random() < 0.25) showMessage(msgs[Math.floor(Math.random()*msgs.length)], a.color);
}

function endGame() {
  gameOver = true;
  triggerShake(10, 30);
  document.getElementById('overlay-score').textContent = score;
  document.getElementById('overlay-best').textContent = best > 0 ? '🏆 Best: ' + best : '';
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 900);
}

// ---- Game Loop ----
function loop() {
  updateGame();
  drawScene();
  requestAnimationFrame(loop);
}

// ---- Click to Shoot ----
function handleShoot(cx, cy) {
  const r = canvas.getBoundingClientRect();
  const mx = cx - r.left;
  const my = cy - r.top;

  // Click flash
  clickFlashes.push({ x: mx, y: my, life: 12, maxLife: 12 });

  // Check if clicked an alien
  let hit = false;
  aliens.forEach(a => {
    const dx = mx - a.x, dy = my - a.y;
    if (Math.sqrt(dx*dx + dy*dy) < a.size / 2 + 10) {
      a.hp--;
      a.hitFlash = 6;
      spawnZap(a.x, a.y);
      if (a.hp <= 0) killAlien(a);
      hit = true;
    }
  });

  // Fire laser toward click
  LANES.forEach(ly => {
    if (Math.abs(my - ly) < 40) {
      bullets.push({ x: BASE_X + 60, y: ly });
    }
  });

  if (!hit) {
    bullets.push({ x: BASE_X + 60, y: my });
  }
}

canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  handleShoot(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) return;
  Array.from(e.touches).forEach(t => handleShoot(t.clientX, t.clientY));
}, { passive: false });

init();
</script>
</body>
</html>
