<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geometry Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border-radius: 6px; }
</style>
</head>
<body>
anvas id="c" width="800" height="400"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');

// ── CONSTANTS ──────────────────────────────────────────────
const GROUND = 320;      // top of ground
const PLAYER_W = 36;
const PLAYER_H = 36;
const GRAVITY = 0.5;
const JUMP_FORCE = -10;
const SPEED = 3.8;       // side‑scroll speed

// ── STATE ──────────────────────────────────────────────────
let state = 'menu';      // menu | playing | dead
let attempts = 1;
let camX = 0;
let progress = 0;        // 0–100 %

// ── PLAYER ─────────────────────────────────────────────────
const player = {
  x: 140,
  y: GROUND - PLAYER_H,
  vx: 0,
  vy: 0,
  onGround: false,
  rot: 0,
};

// ── LEVEL ──────────────────────────────────────────────────
function makeLevel() {
  return [
    { type: 'spike', x: 600,  y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 750,  y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 900,  y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 1050, y: GROUND-38,  w: 38, h: 38 },

    { type: 'spike', x: 1200, y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 1300, y: GROUND-38,  w: 38, h: 38 }, // 100px gap

    { type: 'block', x: 1480, y: GROUND-40,  w: 40, h: 40 },
    { type: 'spike', x: 1600, y: GROUND-38,  w: 38, h: 38 },

    { type: 'spike', x: 1800, y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 1900, y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 2000, y: GROUND-38,  w: 38, h: 38 }, // 100px gaps

    { type: 'block', x: 2200, y: GROUND-40,  w: 40, h: 40 },
    { type: 'spike', x: 2350, y: GROUND-38,  w: 38, h: 38 },
    { type: 'spike', x: 2450, y: GROUND-38,  w: 38, h: 38 },

    { type: 'end', x: 2600, y: 0, w: 30, h: GROUND }
  ];
}
let level = makeLevel();

// ── INPUT ──────────────────────────────────────────────────
function jump() {
  if (state === 'menu') {
    state = 'playing';
    attempts = 1;
    reset();
  }
  else if (state === 'playing' && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
  else if (state === 'dead') {
    state = 'playing';
    attempts++;
    reset();
  }
}

// listen for click/tap
ctx.canvas.addEventListener('mousedown', jump);
ctx.canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

// listen for space / up
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

// ── HELPERS ────────────────────────────────────────────────
function reset() {
  player.x = 140;
  player.y = GROUND - PLAYER_H;
  player.vy = 0;
  player.rot = 0;
  camX = 0;
  progress = 0;
}

function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── UPDATE ─────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  // move camera
  camX += SPEED;
  progress = Math.min(100, Math.floor((camX / 2300) * 100));  // 2300 ~ level length

  // gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // ground
  if (player.y >= GROUND - PLAYER_H) {
    player.y = GROUND - PLAYER_H;
    player.vy = 0;
    player.rot = 0;
    player.onGround = true;
  }

  // rotate in air
  else {
    player.rot += 4;
  }

  // collisions
  for (const o of level) {
    const osx = o.x - camX;  // screen x of obstacle

    // win condition
    if (o.type === 'end' && osx <= 140) {
      state = 'win';
      return;
    }

    if (o.type === 'spike' || o.type === 'block') {
      const px = 140; // player always on screen x = 140
      const py = player.y;

      // shrink hitbox so it feels fair
      if (overlaps(px+4, py+4, PLAYER_W-8, PLAYER_H-8, osx+4, o.y+4, o.w-8, o.h-8)) {
        state = 'dead';
        return;
      }
    }
  }
}

// ── DRAW ───────────────────────────────────────────────────
function drawBG() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, 800, 400);
}

function drawGround() {
  const g = ctx.createLinearGradient(0, GROUND, 0, 400);
  g.addColorStop(0, '#22aa22');
  g.addColorStop(1, '#104010');
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND, 800, 400 - GROUND);
}

function drawSpike(x, y, w, h) {
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.moveTo(x, y + h);
  ctx.lineTo(x + w/2, y);
  ctx.lineTo(x + w, y + h);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#aa0000';
  ctx.stroke();
}

function drawBlock(x, y, w, h) {
  ctx.fillStyle = '#4477ff';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2255cc';
  ctx.strokeRect(x, y, w, h);
}

function drawPlayer() {
  const cx = 140 + PLAYER_W/2;
  const cy = player.y + PLAYER_H/2;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(player.rot * Math.PI / 180);

  ctx.fillStyle = '#00eeff';
  ctx.fillRect(-PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
  ctx.strokeStyle = '#00aacc';
  ctx.strokeRect(-PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);

  ctx.fillStyle = '#0088aa';
  ctx.fillRect(-PLAYER_W/2+6, -PLAYER_H/2+6, PLAYER_W-12, PLAYER_H-12);

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawObstacles() {
  for (const o of level) {
    const osx = o.x - camX;
    if (osx < -100 || osx > 900) continue;  // skip off‑screen

    if (o.type === 'spike') {
      drawSpike(osx, o.y, o.w, o.h);
    }
    else if (o.type === 'block') {
      drawBlock(osx, o.y, o.w, o.h);
    }
  }
}

function drawUI() {
  const barW = 240;
  const bx = 800/2 - barW/2;
  const by = 10;

  // shadow bar
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(bx-4, by-4, barW+8, 28);

  // bg bar
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, barW, 20);

  // fill bar (green)
  ctx.fillStyle = '#00cc66';
  ctx.fillRect(bx, by, barW * (progress / 100), 20);

  // border
  ctx.strokeStyle = '#555';
  ctx.strokeRect(bx, by, barW, 20);

  // text
  ctx.fillStyle = '#fff';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`Progress: ${progress}%`, 800/2, by+15);

  // attempts
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText(`Attempt ${attempts}`, 10, 20);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 800, 400);

  ctx.fillStyle = '#00eeff';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GEOMETRY DASH', 800/2, 200);

  ctx.fillStyle = '#ffffff';
  ctx.font = '18px Arial';
  ctx.fillText('Click, Tap, or SPACE to jump', 800/2, 250);
}

function drawDead() {
  ctx.fillStyle = 'rgba(180,0,0,0.3)';
  ctx.fillRect(0, 0, 800, 400);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('YOU DIED', 800/2, 200);

  ctx.fillStyle = '#ffffff';
  ctx.font = '16px Arial';
  ctx.fillText(`Progress: ${progress}%`, 800/2, 240);
  ctx.fillText(`Attempt ${attempts}`, 800/2, 260);
  ctx.fillText('Click, Tap, or SPACE to retry', 800/2, 290);

  ctx.textAlign = 'left';
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,140,0,0.35)';
  ctx.fillRect(0, 0, 800, 400);

  ctx.fillStyle = '#00cc88';
  ctx.font = 'bold 42px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL DONE', 800/2, 200);

  ctx.fillStyle = '#ffffff';
  ctx.font = '16px Arial';
  ctx.fillText(`Finished in ${attempts} attempt${attempts !== 1 ? 's' : ''}!`, 800/2, 240);

  ctx.textAlign = 'left';
}

// ── GAME LOOP ──────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, 800, 400);
  drawBG();
  drawGround();
  drawObstacles();
  drawPlayer();

  if (state === 'menu')  drawMenu();
  if (state === 'dead')  drawDead();
  if (state === 'win')   drawWin();
  if (state !== 'menu')  drawUI();

  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
